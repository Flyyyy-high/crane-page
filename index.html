<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北极熊 (Polar Bear) - 极地霸主科普</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6487FA;
            --bg-white: #FFFFFF;
            --bg-gray: #F8F8F8;
            --text-main: #1E1F24;
            --text-secondary: #848691;
            --text-tertiary: #B7B9C1;
            --transition: all 0.28s ease;
            --desktop-w: 788;
            --desktop-h: 492;
            --mobile-w: 380;
            --mobile-h: 456;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
        }

        #fit-shell {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: var(--bg-gray);
        }

        #app {
            position: relative;
            z-index: 1;
            width: 788px;
            height: 492px;
            overflow: hidden;
            background: var(--bg-gray);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            transform-origin: center center;
        }

        .bg-glow {
            position: absolute;
            width: 40%;
            height: 48%;
            border-radius: 999px;
            top: -10%;
            left: -8%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(100, 135, 250, 0.2) 0%, rgba(100, 135, 250, 0) 70%);
            z-index: 0;
            display: none;
        }

        header { display: none; }

        .segmented-control {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 18px;
            padding: 3px;
            display: flex;
            position: relative;
        }

        .segment-btn {
            border: none;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 5px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            z-index: 2;
            min-width: 92px;
        }

        .segment-btn.active {
            color: var(--bg-white);
        }

        .segment-bg {
            position: absolute;
            top: 3px;
            bottom: 3px;
            left: 3px;
            width: calc(50% - 3px);
            background: var(--primary);
            border-radius: 14px;
            transition: transform 0.28s ease;
            z-index: 1;
        }

        main {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .switch-bar {
            height: 76px;
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 0.64fr 1.36fr;
            gap: 8px;
        }

        .switch-group {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 12px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 10px;
            min-width: 0;
        }

        .switch-group.feature-group {
            justify-content: center;
        }

        .switch-group.feature-group .switch-items {
            flex: 0 0 auto;
        }

        .switch-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 0;
            line-height: 1;
            flex-shrink: 0;
            min-width: auto;
        }

        .switch-items {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
            min-width: 0;
            overflow: hidden;
        }

        .panel-item,
        .species-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            padding: 4px 10px 4px 4px;
            border-radius: 999px;
            border: 1px solid rgba(183, 185, 193, 0.75);
            background: var(--bg-white);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            min-height: 34px;
        }

        .panel-item.active,
        .species-item.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(100, 135, 250, 0.08);
        }

        .switch-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: contain;
            background-color: #F0F0F4;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .panel-item.active .switch-avatar,
        .species-item.active .switch-avatar {
            border-color: var(--primary);
        }

        .switch-name {
            font-size: 13px;
            font-weight: 700;
            color: inherit;
            white-space: nowrap;
            line-height: 1;
        }

        .view-container {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.992);
            transition: var(--transition);
        }

        .view-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .panel {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .panel-visual {
            flex: 1.42;
            position: relative;
            min-width: 0;
        }

        .panel-detail {
            flex: 1;
            min-width: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.28s ease;
        }

        .ruler, .lynx-stage, .compare-stage {
            position: absolute;
            top: 34px;
            bottom: 32px;
        }

        .ruler {
            left: 10px;
            width: 56px;
            border-right: 1px solid rgba(183, 185, 193, 0.9);
            z-index: 5;
        }

        .ruler-tick {
            position: absolute;
            right: 0;
            width: 6px;
            height: 1px;
            background: var(--text-tertiary);
        }

        .ruler-tick::before {
            content: attr(data-val);
            position: absolute;
            right: 14px;
            left: auto;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: monospace;
            white-space: nowrap;
            text-align: right;
        }

        .ruler-tick.major {
            width: 12px;
            background: var(--text-secondary);
        }

        .horizon-line {
            position: absolute;
            left: 66px;
            right: 10px;
            bottom: 32px;
            height: 1px;
            border-radius: 0;
            background: rgba(183, 185, 193, 0.9);
            z-index: 1;
        }

        #view0 .panel-visual { width: 100%; }

        .lynx-stage {
            left: 73px;
            right: 10px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: flex-end;
            z-index: 2;
        }

        .lynx-figure {
            position: relative;
            display: none;
            z-index: 1;
            transition: opacity 0.2s ease;
        }

        .lynx-figure.active {
            display: inline-flex;
        }

        .lynx-figure img,
        .stage-animal img {
            height: 100%;
            width: auto;
            display: block;
            object-fit: contain;
            object-position: bottom center;
            transform-origin: bottom center;
            transition: all 0.36s ease;
            filter: drop-shadow(0 6px 12px rgba(183, 185, 193, 0.65));
        }

        .view-label {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .view-hint {
            display: none;
        }

        .pose-tabs {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            display: inline-flex;
            gap: 6px;
            padding: 3px;
            border-radius: 999px;
            border: 1px solid rgba(183, 185, 193, 0.8);
            background: var(--bg-white);
        }

        .pose-tab {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            border-radius: 999px;
            padding: 4px 12px;
            cursor: pointer;
        }

        .pose-tab.active {
            background: var(--bg-gray);
            color: var(--text-main);
        }

        .hotspot {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-white);
            border: 2px solid var(--primary);
            cursor: pointer;
            transform: translate(-50%, 50%);
            animation: attractPulse 2s infinite ease-out;
            z-index: 10;
        }

        @keyframes attractPulse {
            0% { box-shadow: 0 0 0 0 rgba(100, 135, 250, 0.45); }
            70% { box-shadow: 0 0 0 10px rgba(100, 135, 250, 0); }
            100% { box-shadow: 0 0 0 0 rgba(100, 135, 250, 0); }
        }

        .hotspot:hover {
            background: var(--primary);
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.8);
            text-align: center;
            line-height: 30px;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            z-index: 20;
            display: none;
        }

        .left-arrow { left: 0; }
        .right-arrow { right: 0; }

        @media (min-width: 600px) {
            .nav-arrow { display: none !important; }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 31, 36, 0.42);
            backdrop-filter: blur(2px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.8);
            padding: 16px;
            border-radius: 20px;
            width: min(92vw, 560px);
            max-height: min(82vh, 620px);
            overflow: auto;
            position: relative;
            transform: scale(0.97);
            transition: var(--transition);
            box-shadow: 0 20px 54px rgba(30, 31, 36, 0.24);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: var(--bg-gray);
            color: var(--text-main);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .modal-header {
            padding-right: 36px;
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 18px;
            line-height: 1.2;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .modal-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            min-height: 16px;
        }

        .modal-detail-layout {
            display: grid;
            grid-template-columns: 168px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(183, 185, 193, 0.55);
            background: linear-gradient(140deg, rgba(100, 135, 250, 0.08) 0%, rgba(255, 255, 255, 1) 38%, rgba(248, 248, 248, 1) 100%);
        }

        .modal-zoom {
            width: 168px;
            height: 168px;
            border-radius: 48%;
            border: 4px solid rgba(100, 135, 250, 0.2);
            margin-bottom: 0;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-color: var(--bg-gray);
            display: none;
            box-shadow: 0 8px 22px rgba(100, 135, 250, 0.18), inset 0 0 0 3px rgba(255, 255, 255, 0.8);
        }

        .modal-zoom.active {
            display: inline-block;
        }

        .modal-compare-list {
            display: grid;
            gap: 6px;
            margin-top: 2px;
        }

        .compare-row {
            display: grid;
            grid-template-columns: 56px 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            background: var(--bg-gray);
            border: 1px solid rgba(183, 185, 193, 0.6);
            font-size: 12px;
        }

        .compare-label {
            color: var(--text-secondary);
            font-weight: 700;
        }

        .compare-lynx {
            text-align: right;
            color: var(--primary);
            font-weight: 800;
        }

        .compare-vs {
            color: var(--text-tertiary);
            font-size: 10px;
            font-weight: 700;
        }

        .compare-target {
            text-align: left;
            color: var(--text-main);
            font-weight: 800;
        }

        .modal-content.is-compare .modal-zoom,
        .modal-content.is-compare .modal-text {
            display: none !important;
        }

        .modal-content.is-compare .modal-detail-layout {
            display: none;
        }

        .modal-content.is-compare .modal-compare-list {
            display: grid;
        }

        .modal-content:not(.is-compare) .modal-compare-list {
            display: none;
        }

        .modal-text {
            font-size: 13px;
            line-height: 1.5;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        @media (max-width: 599px) {
            .modal-content {
                width: min(94vw, 460px);
                padding: 14px;
                border-radius: 16px;
            }

            .modal-title {
                font-size: 16px;
            }

            .modal-detail-layout {
                grid-template-columns: 1fr;
                justify-items: center;
                align-items: start;
                gap: 10px;
                padding: 10px 10px 12px;
            }

            .modal-zoom {
                width: 132px;
                height: 132px;
            }

            .modal-text {
                font-size: 12px;
                line-height: 1.55;
            }

            .compare-row {
                grid-template-columns: 52px 1fr auto 1fr;
                padding: 7px 8px;
                font-size: 11px;
            }
        }

        .compare-stage {
            left: 50px;
            right: 10px;
            display: block;
            z-index: 2;
        }

        .compare-detail-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 25;
            border: 1px solid rgba(183, 185, 193, 0.8);
            background: var(--bg-white);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            border-radius: 999px;
            padding: 5px 10px;
            cursor: pointer;
            display: none;
        }

        .stage-animal {
            height: 100%;
            width: 55%;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: absolute;
            bottom: 0;
        }

        .stage-animal.base-animal {
            left: 0;
            z-index: 1;
        }

        .stage-animal.target-animal {
            left: 45%;
            z-index: 2;
        }

        @media (min-width: 600px) {
            .compare-stage {
                display: flex;
                align-items: flex-end;
                justify-content: center;
                gap: 22px;
                padding: 0 18px;
            }

            .stage-animal {
                position: relative;
                width: min(44%, 250px);
            }

            .stage-animal.base-animal,
            .stage-animal.target-animal {
                left: auto;
            }
        }

        .animal-name {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            position: absolute;
            bottom: -16px;
            width: max-content;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .pc-selector { display: none !important; }
        .mobile-selector { display: none !important; }

        .animal-selector {
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 18px;
            z-index: 20;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(183, 185, 193, 0.8);
            width: 100%;
        }

        .selector-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.55;
            transition: var(--transition);
        }

        .selector-item.active {
            opacity: 1;
            transform: scale(1.02);
        }

        .selector-img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid transparent;
            object-fit: cover;
            object-position: top center;
            background: var(--bg-white);
        }

        .selector-item.active .selector-img {
            border-color: var(--primary);
        }

        .selector-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.1;
        }

        .selector-item.active .selector-name {
            color: var(--primary);
        }

        .data-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
            overflow: hidden;
        }

        .chart-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 4px 0;
        }

        canvas#radarChart {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        .stats-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            padding-top: 4px;
            overflow: hidden;
        }

        .stat-row {
            display: flex;
            align-items: center;
            background: var(--bg-gray);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
        }

        .stat-header {
            background: transparent !important;
            padding: 0 8px 3px 8px !important;
        }

        .stat-header .stat-lynx,
        .stat-header .stat-target {
            font-size: 14px !important;
            font-weight: 800 !important;
        }

        .stat-label {
            width: 36px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stat-lynx {
            flex: 1;
            text-align: right;
            color: var(--primary);
            font-weight: 700;
        }

        .stat-vs {
            margin: 0 6px;
            font-size: 9px;
            color: var(--text-tertiary);
            font-weight: 700;
        }

        .stat-target {
            flex: 1;
            text-align: left;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .drawer-handle { display: none; }

        @media (min-width: 600px) {
            .view-container { flex-direction: row; }
            .data-section { flex-direction: column; }
            .chart-wrapper { height: 48%; width: 92%; margin: 0 auto; min-height: 0; flex-shrink: 0; }
            .stats-list { height: 48%; flex-shrink: 0; }
        }

        @media (max-width: 599px) {
            #app { width: 100%; height: 100%; padding: 6px; gap: 6px; }
            #app.mobile-square { width: 100%; height: 100%; padding: 6px; gap: 6px; }
            #app.mobile-compact { width: 100%; height: 100%; padding: 5px; gap: 5px; }
            .view-container { flex-direction: column; gap: 6px; }
            #view1 .panel-detail { display: none !important; }
            #view1 .panel-visual { flex: 1; width: 100%; }
            .compare-detail-btn { display: inline-flex !important; background: rgba(255,255,255,0.95); }
            .switch-bar { height: auto; grid-template-columns: 0.68fr 1.32fr; gap: 6px; }
            .switch-group { flex-direction: column !important; align-items: center; justify-content: center; padding: 6px 8px; gap: 4px; }
            .switch-title { font-size: 10px; text-align: center; }
            .panel-item, .species-item { padding: 3px 6px 3px 3px; min-height: 28px; gap: 4px; }
            .switch-avatar { width: 20px; height: 20px; }
            .switch-name { font-size: 10px; white-space: nowrap; }
            .ruler, .lynx-stage, .compare-stage { top: 18px; bottom: 26px; }
            .ruler { width: 38px; left: 8px; }
            .ruler-tick::before { font-size: 9px; right: 11px; }
            .horizon-line { left: 46px; bottom: 26px; }
            #view0 .lynx-stage { left: 52px; right: 8px; justify-content: center; }
            .pose-tabs { top: 6px; }
        }

        @media (max-width: 360px), (max-height: 380px) {
            .switch-bar { gap: 4px; }
            .switch-group { padding: 4px 5px; gap: 3px; }
            .switch-title { font-size: 9px; }
            .panel-item, .species-item { padding: 2px 4px 2px 2px; min-height: 24px; gap: 3px; }
            .switch-avatar { width: 16px; height: 16px; }
            .switch-name { font-size: 8px !important; }
            .species-item .switch-name { font-size: 8px; }
            .ruler-tick::before { font-size: 8px; right: 10px; }
            .pose-tab { padding: 3px 8px; font-size: 10px; }
        }
    </style>
</head>
<body>
<div id="fit-shell">
<div class="bg-glow"></div>

<div id="app" style="width: 380px; height: 456px; transform: scale(1);">
    <main>
        <!-- 外形特征视图 (北极熊) -->
        <div id="view0" class="view-container active">
            <div class="panel panel-visual">
                <div class="ruler" id="rulerContainerFeature"></div>
                <div class="horizon-line"></div>
                <div class="pose-tabs" role="tablist">
                    <button class="pose-tab active" id="poseFrontBtn" onclick="switchPose(0)">正面</button>
                    <button class="pose-tab" id="poseSideBtn" onclick="switchPose(1)">侧面</button>
                </div>
                <div class="lynx-stage" id="lynxStage">
                    <!-- 正面图：爪子热点 -->
                    <div class="lynx-figure active" id="polarFrontFig" style="display: inline-flex;">
                        <img src="./bjxzm.png" alt="北极熊正面">
                        <div class="hotspot" style="bottom: 40%; left: 80%;" onclick="showDetail('paws')"></div>
                    </div>
                    <!-- 侧面图：耳朵热点 + 尾巴热点，图片路径已更新为 ed.png 和 wb.png -->
                    <div class="lynx-figure" id="polarSideFig" style="display: none;">
                        <img src="./bjxcm.png" alt="北极熊侧面">
                        <div class="hotspot" style="bottom: 95%; left: 55%;" onclick="showDetail('ears')"></div>
                        <div class="hotspot" style="bottom: 20%; left: 5%;" onclick="showDetail('tail')"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 物种对比视图 -->
        <div id="view1" class="view-container">
            <div class="panel panel-visual">
                <div class="ruler" id="rulerContainerCompare"></div>
                <div class="horizon-line"></div>
                <button class="compare-detail-btn" onclick="showCompareDetail()">详细对比</button>
                <div class="compare-stage">
                    <div class="stage-animal base-animal" id="polarCompareBase" style="height: 100%;">
                        <img src="./bjxzm.png">
                        <div class="animal-name" style="color: var(--primary);">北极熊</div>
                    </div>
                    <div class="stage-animal target-animal" id="compareTargetContainer" style="height: 78.5%;">
                        <img id="compareTargetImg" src="./zx.png">
                        <div class="animal-name" id="compareTargetName" style="color: var(--text-secondary);">棕熊</div>
                    </div>
                </div>
            </div>
            <div class="panel panel-detail" id="view1-detail">
                <div class="drawer-handle" onclick="toggleDrawer()">
                    <div class="handle-bar"></div>
                    <span class="handle-text"><span>-</span></span>
                </div>
                <div class="data-section">
                    <div class="chart-wrapper"><canvas id="radarChart" width="260" height="236" style="display: block;"></canvas></div>
                    <div class="stats-list" id="statsGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="switch-bar">
        <div class="switch-group feature-group">
            <div class="switch-title">外形特征</div>
            <div class="switch-items">
                <div class="panel-item active" id="panelFeatureBtn" onclick="switchPanelByAvatar(0)">
                    <img class="switch-avatar" src="./bjxzm.png" alt="北极熊">
                    <span class="switch-name">北极熊</span>
                </div>
            </div>
        </div>
        <div class="switch-group">
            <div class="switch-title">物种对比</div>
            <div class="switch-items">
                <div class="species-item active" onclick="switchPanelByAvatar(1, 'brownbear')" data-key="brownbear">
                    <img class="switch-avatar" src="./zx.png" alt="棕熊">
                    <span class="switch-name">棕熊</span>
                </div>
                <div class="species-item" onclick="switchPanelByAvatar(1, 'asiablack')" data-key="asiablack">
                    <img class="switch-avatar" src="./yzhx.png" alt="亚洲黑熊">
                    <span class="switch-name">亚洲黑熊</span>
                </div>
                <div class="species-item" onclick="switchPanelByAvatar(1, 'americanblack')" data-key="americanblack">
                    <img class="switch-avatar" src="./mzhx.png" alt="美洲黑熊">
                    <span class="switch-name">美洲黑熊</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="infoModal" onclick="closeModal()">
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header"><h3 class="modal-title" id="modalTitle">标题</h3><p class="modal-subtitle" id="modalSubtitle"></p></div>
            <div class="modal-detail-layout" id="modalDetailLayout"><div class="modal-zoom" id="modalZoom"></div><p class="modal-text" id="modalText">内容</p></div>
            <div class="modal-compare-list" id="modalCompareList"></div>
        </div>
    </div>
</div>
</div>

<script>
    const FEATURE_MAX_HEIGHT = 350;   
    const COMPARE_MAX_HEIGHT = 280;   
    const speciesData = {
        polarbear: { name: '北极熊', height: 280, weight: 550, tail: 12, speed: 40, lifespan: 30 },
        brownbear: { name: '棕熊', height: 220, weight: 300, tail: 10, speed: 35, lifespan: 28 },
        asiablack: { name: '亚洲黑熊', height: 200, weight: 280, tail: 9, speed: 30, lifespan: 25 },
        americanblack: { name: '美洲黑熊', height: 190, weight: 250, tail: 8, speed: 32, lifespan: 26 }
    };
    const globalMax = { height: 280, weight: 550, tail: 12, speed: 40, lifespan: 30 };
    function normalize(val, max) { return Math.min(100, (val / max) * 100); }
    const radarMapping = {
        polarbear: [100,100,100,100,100],
        brownbear: [normalize(220,280), normalize(300,550), normalize(10,12), normalize(35,40), normalize(28,30)],
        asiablack: [normalize(200,280), normalize(280,550), normalize(9,12), normalize(30,40), normalize(25,30)],
        americanblack: [normalize(190,280), normalize(250,550), normalize(8,12), normalize(32,40), normalize(26,30)]
    };
    const animalAvatarMap = { polarbear: './bjxzm.png', brownbear: './zx.png', asiablack: './yzhx.png', americanblack: './mzhx.png' };
    // 更新图片路径：耳朵图片 ed.png，尾巴图片 wb.png
    const detailData = {
        ears: { title: "迷你耳朵", text: "北极熊耳朵短小圆润，最大限度减少热量流失，配合10cm厚脂肪抵御-40℃严寒。", zoomImage: "./ed.png", zoomPos: "center", zoomSize: "cover" },
        paws: { title: "巨型船桨式熊掌", text: "掌宽可达30cm，底部密生乳突防滑，是冰面行走和游泳的核心推进器。", zoomImage: "./bjxzm.png", zoomPos: "center", zoomSize: "cover" },
        tail: { title: "极短尾巴", text: "长约8-12cm，极短尾减少散热，适应极地能量保存策略。", zoomImage: "./wb.png", zoomPos: "center", zoomSize: "cover" }
    };
    
    let radarChartInstance = null;
    let currentCompareKey = 'brownbear';
    let compareSwapRequestId = 0;

    function buildRuler(containerId, maxHeightCM) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = '';
        const ticks = [
            { pos: 0, val: `${maxHeightCM}cm`, major: true },
            { pos: 25, val: `${Math.round(maxHeightCM * 0.75)}cm`, major: false },
            { pos: 50, val: `${Math.round(maxHeightCM * 0.5)}cm`, major: true },
            { pos: 75, val: `${Math.round(maxHeightCM * 0.25)}cm`, major: false },
            { pos: 100, val: '0cm', major: true }
        ];
        ticks.forEach(t => {
            const tick = document.createElement('div');
            tick.className = `ruler-tick ${t.major ? 'major' : ''}`;
            tick.style.top = `${t.pos}%`;
            tick.setAttribute('data-val', t.val);
            container.appendChild(tick);
        });
    }
    
    function setFeatureAnimalHeight() {
        const percent = (speciesData.polarbear.height / FEATURE_MAX_HEIGHT) * 100;
        const heightPercent = `${Math.min(100, percent)}%`;
        const frontDiv = document.getElementById('polarFrontFig');
        const sideDiv = document.getElementById('polarSideFig');
        if(frontDiv) frontDiv.style.height = heightPercent;
        if(sideDiv) sideDiv.style.height = heightPercent;
    }
    
    function getHeightPercentByHeight(cm, maxBase = COMPARE_MAX_HEIGHT) { 
        return `${Math.max(0, Math.min(100, (cm/maxBase)*100)).toFixed(2)}%`; 
    }
    
    function updateStatsGrid(key) {
        const target = speciesData[key], base = speciesData.polarbear;
        const rows = [
            { label: '体高', lynx: base.height+' cm', target: target.height+' cm' },
            { label: '体重', lynx: base.weight+' kg', target: target.weight+' kg' },
            { label: '尾长', lynx: base.tail+' cm', target: target.tail+' cm' },
            { label: '时速', lynx: base.speed+' km/h', target: target.speed+' km/h' },
            { label: '寿命', lynx: base.lifespan+' 年', target: target.lifespan+' 年' }
        ];
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-row stat-header"><span class="stat-label"></span><span class="stat-lynx">北极熊</span><span class="stat-vs" style="opacity:0;">VS</span><span class="stat-target">${target.name}</span></div>
            ${rows.map(r => `<div class="stat-row"><span class="stat-label">${r.label}</span><span class="stat-lynx">${r.lynx}</span><span class="stat-vs">VS</span><span class="stat-target">${r.target}</span></div>`).join('')}
        `;
    }
    
    function triggerRadarAnimation(key) {
        if(!radarChartInstance) return;
        radarChartInstance.data.datasets[1].data = [0,0,0,0,0];
        radarChartInstance.update('none');
        setTimeout(() => { radarChartInstance.data.datasets[1].data = radarMapping[key]; radarChartInstance.update(); }, 50);
    }
    
    function selectAnimal(key) {
        currentCompareKey = key;
        document.querySelectorAll('.species-item').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll(`.species-item[data-key="${key}"]`).forEach(el=>el.classList.add('active'));
        const targetImg = document.getElementById('compareTargetImg');
        const targetContainer = document.getElementById('compareTargetContainer');
        const targetName = document.getElementById('compareTargetName');
        const newSrc = animalAvatarMap[key];
        const newHeight = getHeightPercentByHeight(speciesData[key].height, COMPARE_MAX_HEIGHT);
        const reqId = ++compareSwapRequestId;
        targetImg.style.opacity = 0;
        triggerRadarAnimation(key);
        const preload = new Image();
        preload.onload = () => { if(reqId===compareSwapRequestId) { targetImg.src=newSrc; targetContainer.style.height=newHeight; targetName.innerText=speciesData[key].name; requestAnimationFrame(()=>{ if(reqId===compareSwapRequestId) targetImg.style.opacity=1; }); } };
        preload.onerror = () => { if(reqId===compareSwapRequestId) { targetImg.src=newSrc; targetContainer.style.height=newHeight; targetName.innerText=speciesData[key].name; targetImg.style.opacity=1; } };
        preload.src = newSrc;
        updateStatsGrid(key);
    }
    
    function initChart() {
        const ctx = document.getElementById('radarChart').getContext('2d');
        const isMobile = window.innerWidth < 600;
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: { labels: ['体高', '体重', '尾长', '时速', '寿命'], datasets: [
                { label: '北极熊', data: radarMapping.polarbear, backgroundColor: 'rgba(100, 135, 250, 0.32)', borderColor: 'rgba(100, 135, 250, 1)', pointBackgroundColor: 'rgba(100, 135, 250, 1)', borderWidth: 2, pointRadius: 0 },
                { label: '对比物种', data: radarMapping.brownbear, backgroundColor: 'rgba(132, 134, 145, 0.28)', borderColor: 'rgba(132, 134, 145, 1)', pointBackgroundColor: 'rgba(132, 134, 145, 1)', borderWidth: 2, pointRadius: 0 }
            ] },
            options: { responsive: true, maintainAspectRatio: true, aspectRatio: 1.1, layout: { padding: isMobile ? 12 : 18 }, animation: { duration: 600, easing: 'easeOutQuart' }, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { r: { angleLines: { color: 'rgba(0,0,0,0.1)' }, grid: { color: 'rgba(0,0,0,0.1)' }, pointLabels: { font: { size: isMobile ? 9 : 11, weight: 'bold' }, padding: isMobile ? 2 : 4 }, ticks: { display: false, min: 0, max: 100 }, beginAtZero: true } } }
        });
        updateStatsGrid('brownbear');
    }
    
    function switchTab(i) { 
        document.querySelectorAll('.view-container').forEach((v,idx)=>v.classList.toggle('active',idx===i)); 
        if(i===1 && radarChartInstance){ radarChartInstance.resize(); triggerRadarAnimation(currentCompareKey); } 
    }
    
    function switchPanelByAvatar(idx, key) { 
        document.getElementById('panelFeatureBtn').classList.toggle('active', idx===0);
        if(idx===1 && key) { selectAnimal(key); }
        switchTab(idx); 
    }
    
    function switchPose(i) { 
        const front = document.getElementById('polarFrontFig');
        const side = document.getElementById('polarSideFig');
        if(front && side) {
            front.classList.toggle('active', i===0);
            side.classList.toggle('active', i===1);
            front.style.display = i===0 ? 'inline-flex' : 'none';
            side.style.display = i===1 ? 'inline-flex' : 'none';
        }
        document.getElementById('poseFrontBtn').classList.toggle('active', i===0);
        document.getElementById('poseSideBtn').classList.toggle('active', i===1);
    }
    
    function toggleDrawer() { 
        if(window.innerWidth < 600) return;
        document.getElementById('view1-detail').classList.toggle('expanded'); 
    }
    
    function showDetail(k) { 
        let d=detailData[k]; 
        let mc=document.getElementById('modalContent'); 
        let zoom=document.getElementById('modalZoom'); 
        mc.classList.remove('is-compare'); 
        document.getElementById('modalTitle').innerText=d.title; 
        document.getElementById('modalSubtitle').innerText='极地生存特征'; 
        document.getElementById('modalText').innerText=d.text; 
        document.getElementById('modalCompareList').innerHTML=''; 
        zoom.style.backgroundImage=`url(${d.zoomImage})`; 
        zoom.style.backgroundPosition=d.zoomPos; 
        zoom.style.backgroundSize=d.zoomSize; 
        zoom.classList.add('active'); 
        document.getElementById('infoModal').classList.add('active'); 
    }
    
    function showCompareDetail() { 
        let t=speciesData[currentCompareKey], b=speciesData.polarbear; 
        let rows=[{label:'体高',lynx:b.height+' cm',target:t.height+' cm'},{label:'体重',lynx:b.weight+' kg',target:t.weight+' kg'},{label:'尾长',lynx:b.tail+' cm',target:t.tail+' cm'},{label:'最高时速',lynx:b.speed+' km/h',target:t.speed+' km/h'},{label:'圈养寿命',lynx:b.lifespan+' 年',target:t.lifespan+' 年'}]; 
        document.getElementById('modalTitle').innerText='参数对比'; 
        document.getElementById('modalSubtitle').innerText=`${b.name} vs ${t.name}`; 
        document.getElementById('modalText').innerText=''; 
        document.getElementById('modalCompareList').innerHTML=rows.map(r=>`<div class="compare-row"><span class="compare-label">${r.label}</span><span class="compare-lynx">${r.lynx}</span><span class="compare-vs">VS</span><span class="compare-target">${r.target}</span></div>`).join(''); 
        document.getElementById('modalContent').classList.add('is-compare'); 
        document.getElementById('modalZoom').classList.remove('active'); 
        document.getElementById('infoModal').classList.add('active'); 
    }
    
    function closeModal() { document.getElementById('modalContent').classList.remove('is-compare'); document.getElementById('infoModal').classList.remove('active'); }
    
    function applyFrameFit() { 
        const app=document.getElementById('app'); 
        const isDesktop=window.innerWidth>=600&&window.innerHeight>=420; 
        const ratio=window.innerWidth/window.innerHeight; 
        app.classList.toggle('mobile-square',!isDesktop&&ratio>=0.95&&ratio<=1.05); 
        app.classList.toggle('mobile-compact',!isDesktop&&(window.innerWidth<=340||window.innerHeight<=420)); 
        if(isDesktop){ 
            const scale=Math.min(window.innerWidth/788,window.innerHeight/492); 
            app.style.width='788px'; 
            app.style.height='492px'; 
            app.style.transform=`scale(${scale})`; 
        } else { 
            app.style.width=`${window.innerWidth}px`; 
            app.style.height=`${window.innerHeight}px`; 
            app.style.transform='scale(1)'; 
        } 
    }
    
    window.addEventListener('DOMContentLoaded',()=>{ 
        applyFrameFit(); 
        buildRuler('rulerContainerFeature', FEATURE_MAX_HEIGHT);
        buildRuler('rulerContainerCompare', COMPARE_MAX_HEIGHT);
        setFeatureAnimalHeight();
        initChart(); 
        switchPose(0); 
        document.getElementById('polarCompareBase').style.height = getHeightPercentByHeight(speciesData.polarbear.height, COMPARE_MAX_HEIGHT);
        document.getElementById('compareTargetContainer').style.height = getHeightPercentByHeight(speciesData.brownbear.height, COMPARE_MAX_HEIGHT);
        window.addEventListener('resize',()=>{ 
            applyFrameFit(); 
            if(radarChartInstance) radarChartInstance.resize(); 
            setFeatureAnimalHeight(); 
        }); 
        switchPanelByAvatar(0);
    });
</script>
</body>
</html>
