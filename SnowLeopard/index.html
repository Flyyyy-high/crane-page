<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雪豹 (Snow Leopard) - 交互式科普</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6487FA;
            --bg-white: #FFFFFF;
            --bg-gray: #F8F8F8;
            --text-main: #1E1F24;
            --text-secondary: #848691;
            --text-tertiary: #B7B9C1;
            --transition: all 0.28s ease;
            --desktop-w: 788;
            --desktop-h: 492;
            --mobile-w: 380;
            --mobile-h: 456;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
        }

        #fit-shell {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: var(--bg-gray);
        }

        #app {
            position: relative;
            z-index: 1;
            width: 788px;
            height: 492px;
            overflow: hidden;
            background: var(--bg-gray);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            transform-origin: center center;
        }

        .bg-glow {
            position: absolute;
            width: 40%;
            height: 48%;
            border-radius: 999px;
            top: -10%;
            left: -8%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(100, 135, 250, 0.2) 0%, rgba(100, 135, 250, 0) 70%);
            z-index: 0;
            display: none;
        }

        header { display: none; }

        .segmented-control {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 18px;
            padding: 3px;
            display: flex;
            position: relative;
        }

        .segment-btn {
            border: none;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 5px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            z-index: 2;
            min-width: 92px;
        }

        .segment-btn.active {
            color: var(--bg-white);
        }

        .segment-bg {
            position: absolute;
            top: 3px;
            bottom: 3px;
            left: 3px;
            width: calc(50% - 3px);
            background: var(--primary);
            border-radius: 14px;
            transition: transform 0.28s ease;
            z-index: 1;
        }

        main {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .switch-bar {
            height: 76px;
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 0.64fr 1.36fr;
            gap: 8px;
        }

        .switch-group {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 12px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 10px;
            min-width: 0;
        }

        .switch-group.feature-group {
            justify-content: center;
        }

        .switch-group.feature-group .switch-items {
            flex: 0 0 auto;
        }

        .switch-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 0;
            line-height: 1;
            flex-shrink: 0;
            min-width: auto;
        }

        .switch-items {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
            min-width: auto;
            overflow: hidden;
        }

        .panel-item,
        .species-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            padding: 4px 10px 4px 4px;
            border-radius: 999px;
            border: 1px solid rgba(183, 185, 193, 0.75);
            background: var(--bg-white);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            min-height: 34px;
        }

        .panel-item.active,
        .species-item.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(100, 135, 250, 0.08);
        }

        .switch-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: contain;
            background-color: #F0F0F4;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .panel-item.active .switch-avatar,
        .species-item.active .switch-avatar {
            border-color: var(--primary);
        }

        .switch-name {
            font-size: 13px;
            font-weight: 700;
            color: inherit;
            white-space: nowrap;
            line-height: 1;
        }

        .view-container {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.992);
            transition: var(--transition);
        }

        .view-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .panel {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .panel-visual {
            flex: 1.42;
            position: relative;
            min-width: 0;
        }

        .panel-detail {
            flex: 1;
            min-width: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.28s ease;
        }

        .ruler, .lynx-stage, .compare-stage {
            position: absolute;
            top: 34px;
            bottom: 32px;
        }

        .ruler {
            left: 10px;
            width: 56px;
            border-right: 1px solid rgba(183, 185, 193, 0.9);
            z-index: 5;
        }

        .ruler-tick {
            position: absolute;
            right: 0;
            width: 6px;
            height: 1px;
            background: var(--text-tertiary);
        }

        .ruler-tick::before {
            content: attr(data-val);
            position: absolute;
            right: 14px;
            left: auto;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: monospace;
            white-space: nowrap;
            text-align: right;
        }

        .ruler-tick.major {
            width: 12px;
            background: var(--text-secondary);
        }

        .horizon-line {
            position: absolute;
            left: 66px;
            right: 10px;
            bottom: 32px;
            height: 1px;
            border-radius: 0;
            background: rgba(183, 185, 193, 0.9);
            z-index: 1;
        }

        #view0 .panel-visual { width: 100%; }

        .lynx-stage {
            left: 73px;
            right: 10px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: flex-end;
            z-index: 2;
        }

        .lynx-figure {
            position: relative;
            display: none;
            z-index: 1;
            transition: opacity 0.2s ease;
        }

        .lynx-figure.active {
            display: inline-flex;
        }

        .lynx-figure img,
        .stage-animal img {
            height: 100%;
            width: auto;
            display: block;
            object-fit: contain;
            object-position: bottom center;
            transform-origin: bottom center;
            transition: all 0.36s ease;
            filter: drop-shadow(0 6px 12px rgba(183, 185, 193, 0.65));
        }

        .view-label {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .view-hint {
            display: none;
        }

        .pose-tabs {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            display: inline-flex;
            gap: 6px;
            padding: 3px;
            border-radius: 999px;
            border: 1px solid rgba(183, 185, 193, 0.8);
            background: var(--bg-white);
        }

        .pose-tab {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            border-radius: 999px;
            padding: 4px 12px;
            cursor: pointer;
        }

        .pose-tab.active {
            background: var(--bg-gray);
            color: var(--text-main);
        }

        .hotspot {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-white);
            border: 2px solid var(--primary);
            cursor: pointer;
            transform: translate(-50%, 50%);
            animation: attractPulse 2s infinite ease-out;
            z-index: 10;
        }

        @keyframes attractPulse {
            0% { box-shadow: 0 0 0 0 rgba(100, 135, 250, 0.45); }
            70% { box-shadow: 0 0 0 10px rgba(100, 135, 250, 0); }
            100% { box-shadow: 0 0 0 0 rgba(100, 135, 250, 0); }
        }

        .hotspot:hover {
            background: var(--primary);
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.8);
            text-align: center;
            line-height: 30px;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            z-index: 20;
            display: none;
        }

        .left-arrow { left: 0; }
        .right-arrow { right: 0; }

        @media (min-width: 600px) {
            .nav-arrow { display: none !important; }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 31, 36, 0.42);
            backdrop-filter: blur(2px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.8);
            padding: 16px;
            border-radius: 20px;
            width: min(92vw, 560px);
            max-height: min(82vh, 620px);
            overflow: auto;
            position: relative;
            transform: scale(0.97);
            transition: var(--transition);
            box-shadow: 0 20px 54px rgba(30, 31, 36, 0.24);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: var(--bg-gray);
            color: var(--text-main);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .modal-header {
            padding-right: 36px;
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 18px;
            line-height: 1.2;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .modal-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            min-height: 16px;
        }

        .modal-detail-layout {
            display: grid;
            grid-template-columns: 168px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(183, 185, 193, 0.55);
            background: linear-gradient(140deg, rgba(100, 135, 250, 0.08) 0%, rgba(255, 255, 255, 1) 38%, rgba(248, 248, 248, 1) 100%);
        }

        .modal-zoom {
            width: 168px;
            height: 168px;
            border-radius: 50%;
            border: 4px solid rgba(100, 135, 250, 0.2);
            margin-bottom: 0;
            background-repeat: no-repeat;
            background-size: cover;          /* 完全覆盖圆形区域 */
            background-position: center center;
            background-color: var(--bg-gray);
            display: none;
            box-shadow: 0 8px 22px rgba(100, 135, 250, 0.18), inset 0 0 0 3px rgba(255, 255, 255, 0.8);
        }

        .modal-zoom.active {
            display: inline-block;
        }

        .modal-compare-list {
            display: grid;
            gap: 6px;
            margin-top: 2px;
        }

        .compare-row {
            display: grid;
            grid-template-columns: 56px 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            background: var(--bg-gray);
            border: 1px solid rgba(183, 185, 193, 0.6);
            font-size: 12px;
        }

        .compare-label {
            color: var(--text-secondary);
            font-weight: 700;
        }

        .compare-lynx {
            text-align: right;
            color: var(--primary);
            font-weight: 800;
        }

        .compare-vs {
            color: var(--text-tertiary);
            font-size: 10px;
            font-weight: 700;
        }

        .compare-target {
            text-align: left;
            color: var(--text-main);
            font-weight: 800;
        }

        .modal-content.is-compare .modal-zoom,
        .modal-content.is-compare .modal-text {
            display: none !important;
        }

        .modal-content.is-compare .modal-detail-layout {
            display: none;
        }

        .modal-content.is-compare .modal-compare-list {
            display: grid;
        }

        .modal-content:not(.is-compare) .modal-compare-list {
            display: none;
        }

        .modal-text {
            font-size: 13px;
            line-height: 1.5;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        @media (max-width: 599px) {
            .modal-content {
                width: min(94vw, 460px);
                padding: 14px;
                border-radius: 16px;
            }

            .modal-title {
                font-size: 16px;
            }

            .modal-detail-layout {
                grid-template-columns: 1fr;
                justify-items: center;
                align-items: start;
                gap: 10px;
                padding: 10px 10px 12px;
            }

            .modal-zoom {
                width: 132px;
                height: 132px;
            }

            .modal-text {
                font-size: 12px;
                line-height: 1.55;
            }

            .compare-row {
                grid-template-columns: 52px 1fr auto 1fr;
                padding: 7px 8px;
                font-size: 11px;
            }
        }

        .compare-stage {
            left: 50px;
            right: 10px;
            display: block;
            z-index: 2;
        }

        .compare-detail-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 25;
            border: 1px solid rgba(183, 185, 193, 0.8);
            background: var(--bg-white);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            border-radius: 999px;
            padding: 5px 10px;
            cursor: pointer;
            display: none;
        }

        .stage-animal {
            height: 100%;
            width: 55%;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: absolute;
            bottom: 0;
        }

        .stage-animal.base-animal {
            left: 0;
            z-index: 1;
        }

        .stage-animal.target-animal {
            left: 45%;
            z-index: 2;
        }

        @media (min-width: 600px) {
            .compare-stage {
                display: flex;
                align-items: flex-end;
                justify-content: center;
                gap: 22px;
                padding: 0 18px;
            }

            .stage-animal {
                position: relative;
                width: min(44%, 250px);
            }

            .stage-animal.base-animal,
            .stage-animal.target-animal {
                left: auto;
            }
        }

        .animal-name {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            position: absolute;
            bottom: -16px;
            width: max-content;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .pc-selector { display: none !important; }
        .mobile-selector { display: none !important; }

        .animal-selector {
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 18px;
            z-index: 20;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(183, 185, 193, 0.8);
            width: 100%;
        }

        .selector-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.55;
            transition: var(--transition);
        }

        .selector-item.active {
            opacity: 1;
            transform: scale(1.02);
        }

        .selector-img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid transparent;
            object-fit: cover;
            object-position: top center;
            background: var(--bg-white);
        }

        .selector-item.active .selector-img {
            border-color: var(--primary);
        }

        .selector-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.1;
        }

        .selector-item.active .selector-name {
            color: var(--primary);
        }

        .data-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
            overflow: hidden;
        }

        .chart-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas#radarChart {
            width: 100%;
            height: 100%;
        }

        .stats-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            padding-top: 4px;
            overflow: hidden;
        }

        .stat-row {
            display: flex;
            align-items: center;
            background: var(--bg-gray);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
        }

        .stat-header {
            background: transparent !important;
            padding: 0 8px 3px 8px !important;
        }

        .stat-header .stat-lynx,
        .stat-header .stat-target {
            font-size: 14px !important;
            font-weight: 800 !important;
        }

        .stat-label {
            width: 36px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stat-lynx {
            flex: 1;
            text-align: right;
            color: var(--primary);
            font-weight: 700;
        }

        .stat-vs {
            margin: 0 6px;
            font-size: 9px;
            color: var(--text-tertiary);
            font-weight: 700;
        }

        .stat-target {
            flex: 1;
            text-align: left;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .drawer-handle { display: none; }

        @media (min-width: 600px) {
            .view-container { flex-direction: row; }
            .data-section { flex-direction: column; }
            .chart-wrapper { height: 50%; width: 96%; margin: 0 auto; }
            .stats-list { height: 50%; }
        }

        @media (max-width: 599px) {
            #app {
                width: 100%;
                height: 100%;
                padding: 6px;
                gap: 6px;
            }

            #app.mobile-square {
                width: 100%;
                height: 100%;
                padding: 6px;
                gap: 6px;
            }

            #app.mobile-compact {
                width: 100%;
                height: 100%;
                padding: 5px;
                gap: 5px;
            }

            .view-container { flex-direction: column; gap: 6px; }

            .switch-bar {
                height: auto;
                min-height: auto;
                grid-template-columns: 0.68fr 1.32fr;
                gap: 6px;
            }

            .switch-group {
                flex-direction: column !important;
                align-items: center;
                justify-content: center;
                padding: 6px 6px;
                gap: 5px;
                min-height: auto;
                overflow-x: visible;
            }

            .switch-title {
                font-size: 10px;
                text-align: center;
                margin-bottom: 0;
                width: auto;
                flex-shrink: 0;
            }

            .switch-items {
                flex-wrap: nowrap !important;
                overflow: visible !important;
                gap: 4px;
                justify-content: center;
                width: 100%;
            }

            .species-item, .panel-item {
                padding: 2px 6px 2px 3px;
                gap: 3px;
                min-height: 26px;
                flex-shrink: 1;
            }

            .switch-avatar {
                width: 20px;
                height: 20px;
                background-color: #F0F0F4;
            }

            .switch-name {
                font-size: 10px;
                white-space: nowrap;
            }

            #app.mobile-compact .switch-avatar {
                width: 18px;
                height: 18px;
            }
            #app.mobile-compact .switch-name {
                font-size: 9px;
            }
            #app.mobile-compact .species-item,
            #app.mobile-compact .panel-item {
                padding: 2px 5px 2px 2px;
            }

            .ruler, .lynx-stage, .compare-stage { top: 18px; bottom: 26px; }
            .ruler { width: 38px; left: 8px; }
            .ruler-tick::before { font-size: 9px; right: 11px; }
            .horizon-line { left: 46px; bottom: 26px; }

            #app.mobile-square .ruler,
            #app.mobile-square .lynx-stage,
            #app.mobile-square .compare-stage {
                top: 16px;
                bottom: 22px;
            }

            #app.mobile-square .horizon-line { bottom: 22px; }

            #view0 .lynx-stage { left: 52px; right: 8px; justify-content: center; }
            .pose-tabs { top: 6px; }

            #app.mobile-square #view0 .lynx-stage { left: 50px; right: 8px; }
            #app.mobile-square .pose-tabs { top: 4px; }

            #view1 .panel-visual {
                flex: 1;
                height: auto;
                border-radius: 14px;
            }

            #view1 .ruler,
            #view1 .compare-stage {
                top: 58px;
                bottom: 22px;
            }

            #view1 .compare-stage {
                left: 33px;
                right: 8px;
            }

            #app.mobile-square #view1 .ruler,
            #app.mobile-square #view1 .compare-stage {
                top: 50px;
                bottom: 20px;
            }

            #app.mobile-compact #view1 .ruler,
            #app.mobile-compact #view1 .compare-stage {
                top: 44px;
                bottom: 24px;
            }

            #view1 .horizon-line {
                left: 46px;
                bottom: 22px;
            }

            #app.mobile-square #view1 .horizon-line {
                bottom: 20px;
            }

            #app.mobile-compact #view1 .horizon-line {
                bottom: 24px;
            }

            .stage-animal { width: 58%; }
            .stage-animal.base-animal { left: -3%; }
            .stage-animal.target-animal { left: 45%; }

            #view1-detail { display: none !important; }

            .compare-detail-btn { display: inline-flex; }

            .drawer-handle {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 42px;
                cursor: pointer;
                z-index: 31;
                border-bottom: 1px solid rgba(183, 185, 193, 0.8);
            }

            .handle-bar {
                width: 28px;
                height: 3px;
                background: var(--text-tertiary);
                border-radius: 999px;
                margin-bottom: 3px;
            }

            .handle-text {
                font-size: 10px;
                color: var(--primary);
                font-weight: 700;
            }

            #view1-detail:not(.expanded) .handle-text::before { content: '点击展开详细对比'; }
            #view1-detail.expanded .handle-text::before {
                content: '收起对比面板';
                color: var(--text-secondary);
            }
            .handle-text span { display: none; }

            .pc-selector { display: none !important; }
            .mobile-selector {
                display: flex !important;
                position: absolute;
                top: 10px;
                left: 0;
                right: 0;
                justify-content: center;
                gap: 18px;
                z-index: 20;
                padding: 0;
                margin: 0;
                border: none;
                background: transparent;
            }

            .selector-img { width: 30px; height: 30px; object-fit: contain; background: #F0F0F4; }
            .selector-name { font-size: 10px; }

            .data-section {
                flex-direction: row;
                align-items: stretch;
                height: 100%;
            }

            .chart-wrapper { height: 100%; width: 43%; margin: 0; }

            .stats-list {
                width: 57%;
                height: 100%;
                padding-top: 0;
                padding-left: 4px;
                justify-content: center;
                gap: 3px;
            }

            .stat-row {
                padding: 3px 5px;
                font-size: 10px;
                border-radius: 6px;
            }

            .stat-header { padding: 0 2px 2px 2px !important; }

            .stat-header .stat-lynx,
            .stat-header .stat-target {
                font-size: 12px !important;
            }

            .stat-label { width: 28px; font-size: 9px; }
            .stat-vs { margin: 0 3px; font-size: 8px; }
        }
    </style>
</head>
<body>
<div id="fit-shell">
<div class="bg-glow"></div>

<div id="app" style="width: 380px; height: 456px; transform: scale(1);">
    <main>
        <!-- 外形特征视图 (雪豹) -->
        <div id="view0" class="view-container active">
            <div class="panel panel-visual">
                <div class="ruler">
                    <div class="ruler-tick major" style="top: 0%;" data-val="200cm"></div>
                    <div class="ruler-tick" style="top: 25%;" data-val="150cm"></div>
                    <div class="ruler-tick major" style="top: 50%;" data-val="100cm"></div>
                    <div class="ruler-tick" style="top: 75%;" data-val="50cm"></div>
                    <div class="ruler-tick major" style="top: 100%;" data-val="0cm"></div>
                </div>
                
                <div class="horizon-line"></div>
                <div class="pose-tabs" role="tablist" aria-label="外形角度切换">
                    <button class="pose-tab active" id="poseFrontBtn" onclick="switchPose(0)">正面</button>
                    <button class="pose-tab" id="poseSideBtn" onclick="switchPose(1)">侧面</button>
                </div>

                <div class="lynx-stage">
                    <div class="lynx-figure active" style="height: 62.5%; display: inline-flex;">
                        <img src="./xuebaozhengmian.png" alt="雪豹正面">
                        <div class="hotspot" style="bottom: 85%; left: 52%;" onclick="showDetail('ears')"></div>
                        <div class="hotspot" style="bottom: 8%; left: 60%;" onclick="showDetail('paws')"></div>
                    </div>
                    
                    <div class="lynx-figure" style="height: 62.5%; display: none;">
                        <img src="./xuebaocemian.png" alt="雪豹侧面">
                        <div class="hotspot" style="bottom: 40%; left: 22%;" onclick="showDetail('tail')"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 物种对比视图 -->
        <div id="view1" class="view-container">
            <div class="panel panel-visual">
                <div class="ruler">
                    <div class="ruler-tick major" style="top: 0%;" data-val="200cm"></div>
                    <div class="ruler-tick" style="top: 25%;" data-val="150cm"></div>
                    <div class="ruler-tick major" style="top: 50%;" data-val="100cm"></div>
                    <div class="ruler-tick" style="top: 75%;" data-val="50cm"></div>
                    <div class="ruler-tick major" style="top: 100%;" data-val="0cm"></div>
                </div>

                <div class="horizon-line"></div>

                <button class="compare-detail-btn" onclick="showCompareDetail()">详细对比</button>

                <div class="compare-stage">
                    <div class="stage-animal base-animal" style="height: 62.5%;">
                        <img src="./xuebaozhengmian.png">
                        <div class="animal-name" style="color: var(--primary);">雪豹</div>
                    </div>
                    <div class="stage-animal target-animal" id="compareTargetContainer" style="height: 75%;">
                        <img id="compareTargetImg" src="./meizhoushi.png">
                        <div class="animal-name" id="compareTargetName" style="color: var(--text-secondary);">美洲狮</div>
                    </div>
                </div>
            </div>

            <div class="panel panel-detail" id="view1-detail">
                <div class="drawer-handle" onclick="toggleDrawer()">
                    <div class="handle-bar"></div>
                    <span class="handle-text"><span>-</span></span>
                </div>
                <div class="data-section">
                    <div class="chart-wrapper">
                        <canvas id="radarChart" width="0" height="0" style="display: block;"></canvas>
                    </div>
                    <div class="stats-list" id="statsGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="switch-bar">
        <div class="switch-group feature-group">
            <div class="switch-title">外形特征</div>
            <div class="switch-items">
                <div class="panel-item active" id="panelFeatureBtn" onclick="switchPanelByAvatar(0)">
                    <img class="switch-avatar" src="./xuebaozhengmian.png" alt="雪豹">
                    <span class="switch-name">雪豹</span>
                </div>
            </div>
        </div>
        <div class="switch-group">
            <div class="switch-title">物种对比</div>
            <div class="switch-items">
                <div class="species-item" onclick="switchPanelByAvatar(1, 'cougar')" data-key="cougar">
                    <img class="switch-avatar" src="./meizhoushi.png" alt="美洲狮">
                    <span class="switch-name">美洲狮</span>
                </div>
                <div class="species-item" onclick="switchPanelByAvatar(1, 'tiger')" data-key="tiger">
                    <img class="switch-avatar" src="./dongbeihu.png" alt="东北虎">
                    <span class="switch-name">东北虎</span>
                </div>
                <div class="species-item" onclick="switchPanelByAvatar(1, 'desertcat')" data-key="desertcat">
                    <img class="switch-avatar" src="./huangmomao.png" alt="荒漠猫">
                    <span class="switch-name">荒漠猫</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹层 Modal -->
    <div class="modal-overlay" id="infoModal" onclick="closeModal()">
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">标题</h3>
                <p class="modal-subtitle" id="modalSubtitle"></p>
            </div>
            <div class="modal-detail-layout" id="modalDetailLayout">
                <div class="modal-zoom" id="modalZoom"></div>
                <p class="modal-text" id="modalText">内容</p>
            </div>
            <div class="modal-compare-list" id="modalCompareList"></div>
        </div>
    </div>
</div>
</div>

<script>
    // ---------- 全局常量与数据 ----------
    const MAX_HEIGHT_CM = 200; // 标尺最高200cm (东北虎)
    
    const realData = {
        snowleopard: { name: '雪豹', height: 125, weight: 45, tail: 90, speed: 65, lifespan: 18 },
        cougar: { name: '美洲狮', height: 150, weight: 75, tail: 75, speed: 60, lifespan: 20 },
        tiger: { name: '东北虎', height: 200, weight: 220, tail: 100, speed: 70, lifespan: 22 },
        desertcat: { name: '荒漠猫', height: 60, weight: 6, tail: 30, speed: 40, lifespan: 12 }
    };
    
    function normalizeValue(val, maxRef) { return Math.min(100, (val / maxRef) * 100); }
    const radarMapping = {
        snowleopard: [normalizeValue(125,200), normalizeValue(45,220), normalizeValue(90,100), normalizeValue(65,70), normalizeValue(18,22)],
        cougar: [normalizeValue(150,200), normalizeValue(75,220), normalizeValue(75,100), normalizeValue(60,70), normalizeValue(20,22)],
        tiger: [normalizeValue(200,200), normalizeValue(220,220), normalizeValue(100,100), normalizeValue(70,70), normalizeValue(22,22)],
        desertcat: [normalizeValue(60,200), normalizeValue(6,220), normalizeValue(30,100), normalizeValue(40,70), normalizeValue(12,22)]
    };
    
    const animalAvatarMap = {
        snowleopard: './xuebaozhengmian.png',
        cougar: './meizhoushi.png',
        tiger: './dongbeihu.png',
        desertcat: './huangmomao.png'
    };
    
    // 详情图片路径使用相对路径，缩放方式采用 cover 实现填满圆形且无漏边
    const detailData = {
        ears: {
            title: "高鼻梁与鼻腔",
            text: "雪豹拥有宽大的鼻腔和发达的气管，能高效吸入稀薄氧气，适应高海拔缺氧环境，鼻梁骨角化突出利于预热冷空气。",
            zoomImage: "./bizi.png",
            zoomPos: "center center",
            zoomSize: "cover"
        },
        paws: {
            title: "宽大毛掌",
            text: "雪豹的脚掌格外宽大，趾间密生厚毛，如同天然雪地靴，增加摩擦力并防止冻伤，便于在松软积雪中行走。",
            zoomImage: "./jiao.png",
            zoomPos: "center center",
            zoomSize: "cover"
        },
        tail: {
            title: "蓬松长尾",
            text: "雪豹的尾巴几乎与身体等长（90cm左右），粗大蓬松，不仅能在陡峭岩石上保持平衡，夜间还可当作毛毯覆盖口鼻以保暖。",
            zoomImage: "./weiba.png",
            zoomPos: "center center",
            zoomSize: "cover"
        }
    };
    
    let radarChartInstance = null;
    let currentCompareKey = 'cougar';
    let compareSwapRequestId = 0;
    
    function getHeightPercentByHeight(cm) { return `${Math.max(0, Math.min(100, (cm/MAX_HEIGHT_CM)*100)).toFixed(2)}%`; }
    function updateStatsGrid(key) {
        const target = realData[key], base = realData.snowleopard;
        const rows = [
            { label: '体高', lynx: base.height+' cm', target: target.height+' cm' },
            { label: '体重', lynx: base.weight+' kg', target: target.weight+' kg' },
            { label: '尾长', lynx: base.tail+' cm', target: target.tail+' cm' },
            { label: '时速', lynx: base.speed+' km/h', target: target.speed+' km/h' },
            { label: '寿命', lynx: base.lifespan+' 年', target: target.lifespan+' 年' }
        ];
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-row stat-header"><span class="stat-label"></span><span class="stat-lynx">雪豹</span><span class="stat-vs" style="opacity:0;">VS</span><span class="stat-target">${target.name}</span></div>
            ${rows.map(r => `<div class="stat-row"><span class="stat-label">${r.label}</span><span class="stat-lynx">${r.lynx}</span><span class="stat-vs">VS</span><span class="stat-target">${r.target}</span></div>`).join('')}
        `;
    }
    function triggerRadarAnimation(key) {
        if(!radarChartInstance) return;
        radarChartInstance.data.datasets[1].data = [0,0,0,0,0];
        radarChartInstance.update('none');
        setTimeout(() => { radarChartInstance.data.datasets[1].data = radarMapping[key]; radarChartInstance.update(); }, 50);
    }
    function selectAnimal(key) {
        currentCompareKey = key;
        document.querySelectorAll('.species-item').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll(`.species-item[data-key="${key}"]`).forEach(el=>el.classList.add('active'));
        const targetImg = document.getElementById('compareTargetImg');
        const targetContainer = document.getElementById('compareTargetContainer');
        const targetName = document.getElementById('compareTargetName');
        const newSrc = animalAvatarMap[key];
        const newHeight = getHeightPercentByHeight(realData[key].height);
        const reqId = ++compareSwapRequestId;
        targetImg.style.opacity = 0;
        triggerRadarAnimation(key);
        const preload = new Image();
        preload.onload = () => { if(reqId===compareSwapRequestId) { targetImg.src=newSrc; targetContainer.style.height=newHeight; targetName.innerText=realData[key].name; requestAnimationFrame(()=>{ if(reqId===compareSwapRequestId) targetImg.style.opacity=1; }); } };
        preload.onerror = () => { if(reqId===compareSwapRequestId) { targetImg.src=newSrc; targetContainer.style.height=newHeight; targetName.innerText=realData[key].name; targetImg.style.opacity=1; } };
        preload.src = newSrc;
        updateStatsGrid(key);
    }
    function initChart() {
        const ctx = document.getElementById('radarChart').getContext('2d');
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: { labels: ['体高','体重','尾长','时速','寿命'], datasets: [{ label: '雪豹', data: radarMapping.snowleopard, backgroundColor: 'rgba(100, 135, 250, 0.32)', borderColor: 'rgba(100, 135, 250, 1)', pointBackgroundColor: 'rgba(100, 135, 250, 1)', borderWidth: 2, pointRadius: 0 }, { label: '对比物种', data: radarMapping.cougar, backgroundColor: 'rgba(132, 134, 145, 0.28)', borderColor: 'rgba(132, 134, 145, 1)', pointBackgroundColor: 'rgba(132, 134, 145, 1)', borderWidth: 2, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, layout: { padding: window.innerWidth<600?15:25 }, animation: { duration:600, easing:'easeOutQuart' }, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { r: { angleLines:{color:'rgba(0,0,0,0.1)'}, grid:{color:'rgba(0,0,0,0.1)'}, pointLabels:{ font: { size: window.innerWidth<600?9:11, weight:'bold' }, padding:2 }, ticks:{ display: false, min:0, max:100 } } } }
        });
        updateStatsGrid('cougar');
    }
    function switchTab(i) { document.querySelectorAll('.view-container').forEach((v,idx)=>v.classList.toggle('active',idx===i)); if(i===1&&radarChartInstance){ radarChartInstance.resize(); triggerRadarAnimation(currentCompareKey); } }
    function switchPanelByAvatar(idx,key) { document.getElementById('panelFeatureBtn').classList.toggle('active',idx===0); document.querySelectorAll('.species-item').forEach(item=>{ if(idx===1&&key) item.classList.toggle('active',item.getAttribute('data-key')===key); else item.classList.remove('active'); }); switchTab(idx); if(idx===1&&key) selectAnimal(key); }
    let currentFigIndex=0;
    function switchPose(i) { document.querySelectorAll('.lynx-figure').forEach((fig,idx)=>{ fig.classList.toggle('active',idx===i); fig.style.display=idx===i?'inline-flex':'none'; }); document.getElementById('poseFrontBtn').classList.toggle('active',i===0); document.getElementById('poseSideBtn').classList.toggle('active',i===1); }
    function toggleDrawer() { document.getElementById('view1-detail').classList.toggle('expanded'); }
    function showDetail(k) { let d=detailData[k]; let mc=document.getElementById('modalContent'); let zoom=document.getElementById('modalZoom'); mc.classList.remove('is-compare'); document.getElementById('modalTitle').innerText=d.title; document.getElementById('modalSubtitle').innerText='外形细节说明'; document.getElementById('modalText').innerText=d.text; document.getElementById('modalCompareList').innerHTML=''; zoom.style.backgroundImage=`url(${d.zoomImage})`; zoom.style.backgroundPosition=d.zoomPos; zoom.style.backgroundSize=d.zoomSize; zoom.classList.add('active'); document.getElementById('infoModal').classList.add('active'); }
    function showCompareDetail() { let t=realData[currentCompareKey], b=realData.snowleopard; let rows=[{label:'体高',lynx:b.height+' cm',target:t.height+' cm'},{label:'体重',lynx:b.weight+' kg',target:t.weight+' kg'},{label:'尾长',lynx:b.tail+' cm',target:t.tail+' cm'},{label:'最高时速',lynx:b.speed+' km/h',target:t.speed+' km/h'},{label:'圈养寿命',lynx:b.lifespan+' 年',target:t.lifespan+' 年'}]; document.getElementById('modalTitle').innerText='参数对比'; document.getElementById('modalSubtitle').innerText=`${b.name} vs ${t.name}`; document.getElementById('modalText').innerText=''; document.getElementById('modalCompareList').innerHTML=rows.map(r=>`<div class="compare-row"><span class="compare-label">${r.label}</span><span class="compare-lynx">${r.lynx}</span><span class="compare-vs">VS</span><span class="compare-target">${r.target}</span></div>`).join(''); document.getElementById('modalContent').classList.add('is-compare'); document.getElementById('modalZoom').classList.remove('active'); document.getElementById('infoModal').classList.add('active'); }
    function closeModal() { document.getElementById('modalContent').classList.remove('is-compare'); document.getElementById('infoModal').classList.remove('active'); }
    function applyFrameFit() { const app=document.getElementById('app'); const isDesktop=window.innerWidth>=600&&window.innerHeight>=420; const ratio=window.innerWidth/window.innerHeight; app.classList.toggle('mobile-square',!isDesktop&&ratio>=0.95&&ratio<=1.05); app.classList.toggle('mobile-compact',!isDesktop&&(window.innerWidth<=340||window.innerHeight<=420)); if(isDesktop){ const scale=Math.min(window.innerWidth/788,window.innerHeight/492); app.style.width='788px'; app.style.height='492px'; app.style.transform=`scale(${scale})`; } else { app.style.width=`${window.innerWidth}px`; app.style.height=`${window.innerHeight}px`; app.style.transform='scale(1)'; } }
    window.addEventListener('DOMContentLoaded',()=>{ applyFrameFit(); initChart(); switchPose(0); document.querySelector('.base-animal').style.height=getHeightPercentByHeight(realData.snowleopard.height); document.getElementById('compareTargetContainer').style.height=getHeightPercentByHeight(realData.cougar.height); window.addEventListener('resize',()=>{ applyFrameFit(); if(radarChartInstance) radarChartInstance.resize(); }); switchPanelByAvatar(0); });
</script>
</body>
</html>
