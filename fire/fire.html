<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火烈鸟 (Flamingo) - 交互式科普</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6B8AFF;
            --bg-white: #FFFFFF;
            --bg-gray: #F8F8F8;
            --text-main: #1E1F24;
            --text-secondary: #848691;
            --text-tertiary: #B7B9C1;
            --transition: all 0.28s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
        }

        #fit-shell {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: var(--bg-gray);
        }

        #app {
            position: relative;
            z-index: 1;
            width: 788px;
            height: 492px;
            overflow: hidden;
            background: var(--bg-gray);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            transform-origin: center center;
        }

        .bg-glow {
            position: absolute;
            width: 40%;
            height: 48%;
            border-radius: 999px;
            top: -10%;
            left: -8%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(107, 138, 255, 0.2) 0%, rgba(107, 138, 255, 0) 70%);
            z-index: 0;
            display: none;
        }

        main {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .switch-bar {
            height: 76px;
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 0.64fr 1.36fr;
            gap: 8px;
        }

        .switch-group {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 12px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 10px;
            min-width: 0;
        }

        .switch-group.feature-group {
            justify-content: center;
        }

        .switch-group.feature-group .switch-items {
            flex: 0 0 auto;
        }

        .switch-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 0;
            line-height: 1;
            flex-shrink: 0;
            min-width: auto;
        }

        .switch-items {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
            min-width: auto;
            overflow: hidden;
        }

        .panel-item,
        .species-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            padding: 4px 10px 4px 4px;
            border-radius: 999px;
            border: 1px solid rgba(183, 185, 193, 0.75);
            background: var(--bg-white);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            min-height: 34px;
        }

        .panel-item.active,
        .species-item.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(107, 138, 255, 0.08);
        }

        .switch-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: contain;
            border: 2px solid transparent;
            flex-shrink: 0;
            background-color: var(--bg-white);
        }

        .panel-item.active .switch-avatar,
        .species-item.active .switch-avatar {
            border-color: var(--primary);
        }

        .switch-name {
            font-size: 13px;
            font-weight: 700;
            color: inherit;
            white-space: nowrap;
            line-height: 1;
        }

        .view-container {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.992);
            transition: var(--transition);
        }

        .view-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .panel {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.7);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .panel-visual {
            flex: 1.42;
            position: relative;
            min-width: 0;
        }

        .panel-detail {
            flex: 1;
            min-width: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.28s ease;
        }

        .ruler, .flamingo-stage, .compare-stage {
            position: absolute;
            top: 34px;
            bottom: 32px;
        }

        .ruler {
            left: 10px;
            width: 56px;
            border-right: 1px solid rgba(183, 185, 193, 0.9);
            z-index: 5;
        }

        .ruler-tick {
            position: absolute;
            right: 0;
            width: 6px;
            height: 1px;
            background: var(--text-tertiary);
        }

        .ruler-tick::before {
            content: attr(data-val);
            position: absolute;
            right: 14px;
            left: auto;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: monospace;
            white-space: nowrap;
            text-align: right;
        }

        .ruler-tick.major {
            width: 12px;
            background: var(--text-secondary);
        }

        .horizon-line {
            position: absolute;
            left: 66px;
            right: 10px;
            bottom: 32px;
            height: 1px;
            border-radius: 0;
            background: rgba(183, 185, 193, 0.9);
            z-index: 1;
        }

        #view0 .panel-visual { width: 100%; }

        .flamingo-stage {
            left: 73px;
            right: 10px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: flex-end;
            z-index: 2;
        }

        .flamingo-figure {
            position: relative;
            display: none;
            z-index: 1;
            transition: opacity 0.2s ease;
        }

        .flamingo-figure.active {
            display: inline-flex;
        }

        .flamingo-figure img,
        .stage-animal img {
            height: 100%;
            width: auto;
            display: block;
            object-fit: contain;
            object-position: bottom center;
            transform-origin: bottom center;
            transition: all 0.36s ease;
            filter: drop-shadow(0 6px 12px rgba(183, 185, 193, 0.65));
        }

        .pose-tabs {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            display: inline-flex;
            gap: 6px;
            padding: 3px;
            border-radius: 999px;
            border: 1px solid rgba(183, 185, 193, 0.8);
            background: var(--bg-white);
        }

        .pose-tab {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            border-radius: 999px;
            padding: 4px 12px;
            cursor: pointer;
        }

        .pose-tab.active {
            background: var(--bg-gray);
            color: var(--text-main);
        }

        .hotspot {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg-white);
            border: 2px solid var(--primary);
            cursor: pointer;
            transform: translate(-50%, 50%);
            animation: attractPulse 2s infinite ease-out;
            z-index: 10;
        }

        @keyframes attractPulse {
            0% { box-shadow: 0 0 0 0 rgba(107, 138, 255, 0.45); }
            70% { box-shadow: 0 0 0 10px rgba(107, 138, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(107, 138, 255, 0); }
        }

        .hotspot:hover {
            background: var(--primary);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 31, 36, 0.42);
            backdrop-filter: blur(2px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-white);
            border: 1px solid rgba(183, 185, 193, 0.8);
            padding: 16px;
            border-radius: 20px;
            width: min(92vw, 560px);
            max-height: min(82vh, 620px);
            overflow: auto;
            position: relative;
            transform: scale(0.97);
            transition: var(--transition);
            box-shadow: 0 20px 54px rgba(30, 31, 36, 0.24);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: var(--bg-gray);
            color: var(--text-main);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
        }

        .modal-header {
            padding-right: 36px;
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 18px;
            line-height: 1.2;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .modal-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            min-height: 16px;
        }

        .modal-detail-layout {
            display: grid;
            grid-template-columns: 168px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(183, 185, 193, 0.55);
            background: linear-gradient(140deg, rgba(107, 138, 255, 0.08) 0%, rgba(255, 255, 255, 1) 38%, rgba(248, 248, 248, 1) 100%);
        }

        .modal-zoom {
            width: 168px;
            height: 168px;
            border-radius: 50%;
            border: 4px solid rgba(107, 138, 255, 0.2);
            margin-bottom: 0;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-color: var(--bg-gray);
            display: none;
            box-shadow: 0 8px 22px rgba(107, 138, 255, 0.18), inset 0 0 0 3px rgba(255, 255, 255, 0.8);
        }

        .modal-zoom.active {
            display: inline-block;
        }

        .modal-zoom.error {
            background-image: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            background-color: #f0f0f0;
        }

        .modal-compare-list {
            display: grid;
            gap: 6px;
            margin-top: 2px;
        }

        .compare-row {
            display: grid;
            grid-template-columns: 56px 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            background: var(--bg-gray);
            border: 1px solid rgba(183, 185, 193, 0.6);
            font-size: 12px;
        }

        .compare-label {
            color: var(--text-secondary);
            font-weight: 700;
        }

        .compare-flamingo {
            text-align: right;
            color: var(--primary);
            font-weight: 800;
        }

        .compare-vs {
            color: var(--text-tertiary);
            font-size: 10px;
            font-weight: 700;
        }

        .compare-target {
            text-align: left;
            color: var(--text-main);
            font-weight: 800;
        }

        .modal-content.is-compare .modal-zoom,
        .modal-content.is-compare .modal-text {
            display: none !important;
        }

        .modal-content.is-compare .modal-detail-layout {
            display: none;
        }

        .modal-content.is-compare .modal-compare-list {
            display: grid;
        }

        .modal-content:not(.is-compare) .modal-compare-list {
            display: none;
        }

        .modal-text {
            font-size: 13px;
            line-height: 1.5;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        @media (max-width: 599px) {
            .modal-content {
                width: min(94vw, 460px);
                padding: 14px;
                border-radius: 16px;
            }

            .modal-title {
                font-size: 16px;
            }

            .modal-detail-layout {
                grid-template-columns: 1fr;
                justify-items: center;
                align-items: start;
                gap: 10px;
                padding: 10px 10px 12px;
            }

            .modal-zoom {
                width: 132px;
                height: 132px;
            }

            .modal-text {
                font-size: 12px;
                line-height: 1.55;
            }

            .compare-row {
                grid-template-columns: 52px 1fr auto 1fr;
                padding: 7px 8px;
                font-size: 11px;
            }
        }

        .compare-stage {
            left: 50px;
            right: 10px;
            display: block;
            z-index: 2;
        }

        .compare-detail-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 25;
            border: 1px solid rgba(183, 185, 193, 0.8);
            background: var(--bg-white);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            border-radius: 999px;
            padding: 5px 10px;
            cursor: pointer;
            display: none;
        }

        .stage-animal {
            height: 100%;
            width: 55%;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: absolute;
            bottom: 0;
        }

        .stage-animal.base-animal {
            left: 0;
            z-index: 1;
        }

        .stage-animal.target-animal {
            left: 45%;
            z-index: 2;
        }

        @media (min-width: 600px) {
            .compare-stage {
                display: flex;
                align-items: flex-end;
                justify-content: center;
                gap: 22px;
                padding: 0 18px;
            }

            .stage-animal {
                position: relative;
                width: min(44%, 250px);
            }

            .stage-animal.base-animal,
            .stage-animal.target-animal {
                left: auto;
            }
        }

        .animal-name {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            position: absolute;
            bottom: -16px;
            width: max-content;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .data-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            width: 100%;
            overflow: hidden;
        }

        .chart-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas#radarChart {
            width: 100%;
            height: 100%;
        }

        .stats-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            padding-top: 4px;
            overflow: hidden;
        }

        .stat-row {
            display: flex;
            align-items: center;
            background: var(--bg-gray);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
        }

        .stat-header {
            background: transparent !important;
            padding: 0 8px 3px 8px !important;
        }

        .stat-header .stat-flamingo,
        .stat-header .stat-target {
            font-size: 14px !important;
            font-weight: 800 !important;
        }

        .stat-label {
            width: 36px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stat-flamingo {
            flex: 1;
            text-align: right;
            color: var(--primary);
            font-weight: 700;
        }

        .stat-vs {
            margin: 0 6px;
            font-size: 9px;
            color: var(--text-tertiary);
            font-weight: 700;
        }

        .stat-target {
            flex: 1;
            text-align: left;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .drawer-handle { display: none; }

        /* PC端：雷达图容器缩小，以确保内容完整展示 */
        @media (min-width: 600px) {
            .data-section {
                padding: 4px;
            }
            .chart-wrapper {
                max-height: 180px;
                min-height: 160px;
                padding: 0 6px;
            }
            canvas#radarChart {
                width: 100%;
                height: 100%;
                max-width: 280px;
                margin: 0 auto;
            }
        }

        /* 移动端自适应布局 + 基座图片右移5px（保持不变） */
        @media (max-width: 599px) {
            #app {
                width: 100%;
                height: 100%;
                padding: 6px;
                gap: 6px;
            }

            .view-container { flex-direction: column; gap: 6px; }

            .switch-bar {
                display: flex;
                gap: 6px;
                height: auto;
                grid-template-columns: unset;
            }

            .switch-group:first-child {
                flex: 0 0 auto;
                max-width: 86px;
                min-width: 74px;
            }

            .switch-group:last-child {
                flex: 1;
                min-width: 0;
            }

            .switch-group {
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 6px 5px;
                gap: 5px;
                min-height: auto;
            }

            .switch-title {
                font-size: 10px;
                text-align: center;
                margin: 0;
                width: 100%;
                line-height: 1.2;
            }

            .switch-items {
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: visible;
                justify-content: center;
                align-items: center;
                gap: 5px;
                width: 100%;
            }

            .panel-item,
            .species-item {
                flex-shrink: 0;
                padding: 2px 6px 2px 2px;
                gap: 4px;
                min-height: 28px;
            }

            .switch-avatar {
                width: 20px;
                height: 20px;
                object-fit: contain;
            }

            .switch-name {
                font-size: 10px;
            }

            /* 移动端左侧火烈鸟图片向右移动5px */
            .stage-animal.base-animal {
                transform: translateX(5px);
            }

            @media (max-width: 340px), (max-height: 380px) {
                .switch-group:first-child {
                    max-width: 72px;
                    min-width: 66px;
                }
                .switch-group {
                    padding: 4px 3px;
                    gap: 3px;
                }
                .switch-title {
                    font-size: 9px;
                }
                .panel-item, .species-item {
                    padding: 2px 4px 2px 2px;
                    gap: 3px;
                    min-height: 24px;
                }
                .switch-avatar {
                    width: 18px;
                    height: 18px;
                }
                .switch-name {
                    font-size: 9px;
                }
                .stage-animal.base-animal {
                    transform: translateX(3px);
                }
            }

            .ruler, .flamingo-stage, .compare-stage { top: 18px; bottom: 26px; }
            .ruler { width: 38px; left: 8px; }
            .ruler-tick::before { font-size: 9px; right: 11px; }
            .horizon-line { left: 46px; bottom: 26px; }
            #view0 .flamingo-stage { left: 52px; right: 8px; justify-content: center; }
            .pose-tabs { top: 6px; }
            #view1 .panel-visual {
                flex: 1;
                height: auto;
                border-radius: 14px;
            }
            #view1 .ruler,
            #view1 .compare-stage {
                top: 58px;
                bottom: 22px;
            }
            #view1 .compare-stage {
                left: 33px;
                right: 8px;
            }
            #view1 .horizon-line {
                left: 46px;
                bottom: 22px;
            }
            .stage-animal { width: 58%; }
            .stage-animal.target-animal { left: 45%; }
            #view1-detail { display: none !important; }
            .compare-detail-btn { display: inline-flex; }
            .drawer-handle {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 42px;
                cursor: pointer;
                z-index: 31;
                border-bottom: 1px solid rgba(183, 185, 193, 0.8);
            }
            .handle-bar {
                width: 28px;
                height: 3px;
                background: var(--text-tertiary);
                border-radius: 999px;
                margin-bottom: 3px;
            }
            .handle-text {
                font-size: 10px;
                color: var(--primary);
                font-weight: 700;
            }
            #view1-detail:not(.expanded) .handle-text::before { content: '点击展开详细对比'; }
            #view1-detail.expanded .handle-text::before {
                content: '收起对比面板';
                color: var(--text-secondary);
            }
            .data-section {
                flex-direction: row;
                align-items: stretch;
                height: 100%;
            }
            .chart-wrapper { height: 100%; width: 43%; margin: 0; }
            .stats-list {
                width: 57%;
                height: 100%;
                padding-top: 0;
                padding-left: 4px;
                justify-content: center;
                gap: 3px;
            }
            .stat-row {
                padding: 3px 5px;
                font-size: 10px;
                border-radius: 6px;
            }
            .stat-header .stat-flamingo,
            .stat-header .stat-target {
                font-size: 12px !important;
            }
            .stat-label { width: 28px; font-size: 9px; }
            .stat-vs { margin: 0 3px; font-size: 8px; }
        }
    </style>
</head>
<body>
<div id="fit-shell">
<div class="bg-glow"></div>

<div id="app" style="width: 788px; height: 492px; transform: scale(1);">
    <main>
        <!-- 视图 1：外形特征 -->
        <div id="view0" class="view-container active">
            <div class="panel panel-visual">
                <div class="ruler">
                    <div class="ruler-tick major" style="top: 0%;" data-val="150cm"></div>
                    <div class="ruler-tick" style="top: 25%;"></div>
                    <div class="ruler-tick major" style="top: 50%;" data-val="75cm"></div>
                    <div class="ruler-tick" style="top: 75%;"></div>
                    <div class="ruler-tick major" style="top: 100%;" data-val="0cm"></div>
                </div>
                
                <div class="horizon-line"></div>
                <div class="pose-tabs">
                    <button class="pose-tab active" id="poseFrontBtn" onclick="switchPose(0)">正面</button>
                    <button class="pose-tab" id="poseSideBtn" onclick="switchPose(1)">侧面</button>
                </div>

                <div class="flamingo-stage">
                    <div class="flamingo-figure active" style="height: 86.67%; display: inline-flex;">
                        <img src="flamingo_front.png.png" alt="火烈鸟正面" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%236B8AFF%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🔥%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        <div class="hotspot" style="bottom: 25%; left: 55%;" onclick="showDetail('leg')"></div>
                    </div>
                    <div class="flamingo-figure" style="height: 86.67%; display: none;">
                        <img src="flamingo_side.png.png" alt="火烈鸟侧面" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%236B8AFF%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🔥%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        <div class="hotspot" style="bottom: 85%; left: 97%;" onclick="showDetail('beak')"></div>
                        <div class="hotspot" style="bottom: 60%; left: 35%;" onclick="showDetail('feather')"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 视图 2：物种对比 -->
        <div id="view1" class="view-container">
            <div class="panel panel-visual">
                <div class="ruler">
                    <div class="ruler-tick major" style="top: 0%;" data-val="150cm"></div>
                    <div class="ruler-tick" style="top: 25%;"></div>
                    <div class="ruler-tick major" style="top: 50%;" data-val="75cm"></div>
                    <div class="ruler-tick" style="top: 75%;"></div>
                    <div class="ruler-tick major" style="top: 100%;" data-val="0cm"></div>
                </div>
                <div class="horizon-line"></div>
                <button class="compare-detail-btn" onclick="showCompareDetail()">详细对比</button>
                <div class="compare-stage">
                    <div class="stage-animal base-animal" style="height: 86.67%;">
                        <img src="flamingo_side.png.png" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%236B8AFF%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🔥%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        <div class="animal-name" style="color: var(--primary);">火烈鸟</div>
                    </div>
                    <div class="stage-animal target-animal" id="compareTargetContainer" style="height: 100%;">
                        <img id="compareTargetImg" src="daning_he.png.png" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%23848691%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🐦%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        <div class="animal-name" id="compareTargetName" style="color: var(--text-secondary);">丹顶鹤</div>
                    </div>
                </div>
            </div>
            <div class="panel panel-detail" id="view1-detail">
                <div class="drawer-handle" onclick="toggleDrawer()">
                    <div class="handle-bar"></div>
                    <span class="handle-text"><span>-</span></span>
                </div>
                <div class="data-section">
                    <div class="chart-wrapper">
                        <canvas id="radarChart" width="0" height="0"></canvas>
                    </div>
                    <div class="stats-list" id="statsGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="switch-bar">
        <div class="switch-group feature-group">
            <div class="switch-title">外形特征</div>
            <div class="switch-items">
                <div class="panel-item active" id="panelFeatureBtn" onclick="switchPanelByAvatar(0)">
                    <img class="switch-avatar" src="flamingo_front.png.png" alt="火烈鸟" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%236B8AFF%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🔥%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    <span class="switch-name">火烈鸟</span>
                </div>
            </div>
        </div>
        <div class="switch-group">
            <div class="switch-title">物种对比</div>
            <div class="switch-items">
                <div class="species-item active" onclick="switchPanelByAvatar(1, 'crane')" data-key="crane">
                    <img class="switch-avatar" src="daning_he.png.png" alt="丹顶鹤" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%23848691%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🐦%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    <span class="switch-name">丹顶鹤</span>
                </div>
                <div class="species-item" onclick="switchPanelByAvatar(1, 'avocet')" data-key="avocet">
                    <img class="switch-avatar" src="fanzuiyu.png.png" alt="反嘴鹬" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%23848691%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🐦%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    <span class="switch-name">反嘴鹬</span>
                </div>
                <div class="species-item" onclick="switchPanelByAvatar(1, 'spoonbill')" data-key="spoonbill">
                    <img class="switch-avatar" src="baibilu.png.png" alt="白琵鹭" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%23848691%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2230%22%3E🐦%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    <span class="switch-name">白琵鹭</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹层 Modal -->
    <div class="modal-overlay" id="infoModal" onclick="closeModal()">
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">标题</h3>
                <p class="modal-subtitle" id="modalSubtitle"></p>
            </div>
            <div class="modal-detail-layout" id="modalDetailLayout">
                <div class="modal-zoom" id="modalZoom"></div>
                <p class="modal-text" id="modalText">内容</p>
            </div>
            <div class="modal-compare-list" id="modalCompareList"></div>
        </div>
    </div>
</div>
</div>

<script>
    function applyFrameFit() {
        const app = document.getElementById('app');
        const isDesktop = window.innerWidth >= 600 && window.innerHeight >= 420;
        if (isDesktop) {
            const baseW = 788;
            const baseH = 492;
            const scale = Math.min(window.innerWidth / baseW, window.innerHeight / baseH);
            app.style.width = `${baseW}px`;
            app.style.height = `${baseH}px`;
            app.style.transform = `scale(${scale})`;
            return;
        }
        app.style.width = `${window.innerWidth}px`;
        app.style.height = `${window.innerHeight}px`;
        app.style.transform = 'scale(1)';
    }

    function switchTab(index) {
        const views = document.querySelectorAll('.view-container');
        views.forEach((view, i) => {
            view.classList.toggle('active', i === index);
        });
        if (index === 1 && radarChartInstance) {
            radarChartInstance.resize();
            const activeKey = document.querySelector('.species-item.active')?.getAttribute('data-key') || 'crane';
            triggerRadarAnimation(activeKey);
        }
    }

    function switchPanelByAvatar(index, speciesKey) {
        const featureBtn = document.getElementById('panelFeatureBtn');
        const speciesItems = document.querySelectorAll('.species-item');
        featureBtn.classList.toggle('active', index === 0);
        speciesItems.forEach((item) => {
            if (index === 1 && speciesKey) {
                item.classList.toggle('active', item.getAttribute('data-key') === speciesKey);
            } else {
                item.classList.remove('active');
            }
        });
        switchTab(index);
        if (index === 1 && speciesKey) {
            selectAnimal(speciesKey);
        }
    }

    let currentFigIndex = 0;
    function switchPose(index) {
        const figs = document.querySelectorAll('.flamingo-figure');
        const frontBtn = document.getElementById('poseFrontBtn');
        const sideBtn = document.getElementById('poseSideBtn');
        currentFigIndex = index;
        figs.forEach((fig, i) => {
            fig.classList.toggle('active', i === currentFigIndex);
            fig.style.display = i === currentFigIndex ? 'inline-flex' : 'none';
        });
        frontBtn.classList.toggle('active', currentFigIndex === 0);
        sideBtn.classList.toggle('active', currentFigIndex === 1);
    }

    function toggleDrawer() {
        const detailPanel = document.getElementById('view1-detail');
        detailPanel.classList.toggle('expanded');
    }

    let currentCompareKey = 'crane';
    let compareSwapRequestId = 0;

    function showCompareDetail() {
        const key = currentCompareKey;
        const dTarget = realData[key];
        const dFlamingo = realData.flamingo;
        const modalContent = document.getElementById('modalContent');
        const zoomEl = document.getElementById('modalZoom');
        const compareList = document.getElementById('modalCompareList');
        const rows = [
            { label: '身高', flamingo: dFlamingo.length, target: dTarget.length },
            { label: '体重', flamingo: dFlamingo.weight, target: dTarget.weight },
            { label: '喙长', flamingo: dFlamingo.beak, target: dTarget.beak },
            { label: '颈长', flamingo: dFlamingo.neck, target: dTarget.neck },
            { label: '寿命', flamingo: dFlamingo.lifespan, target: dTarget.lifespan }
        ];
        document.getElementById('modalTitle').innerText = '参数对比';
        document.getElementById('modalSubtitle').innerText = `${dFlamingo.name} vs ${dTarget.name}`;
        document.getElementById('modalText').innerText = '';
        compareList.innerHTML = rows.map((row) => `
            <div class="compare-row">
                <span class="compare-label">${row.label}</span>
                <span class="compare-flamingo">${row.flamingo}</span>
                <span class="compare-vs">VS</span>
                <span class="compare-target">${row.target}</span>
            </div>
        `).join('');
        modalContent.classList.add('is-compare');
        zoomEl.classList.remove('active');
        document.getElementById('infoModal').classList.add('active');
    }

    // 热点图片路径（与 HTML 同级目录）
    const detailData = {
        beak: { title: "弯曲喙部", text: "火烈鸟拥有独特的向下弯曲的喙，这种特殊结构使其能够像筛子一样过滤水中的藻类、浮游生物和小型甲壳类动物。", zoomImage: "./zui.png", zoomPos: 'center center', zoomSize: 'cover' },
        leg: { title: "细长腿脚", text: "火烈鸟的腿细长而有力，适合浅水站立。单腿站立有助于保持体温，减少冷水接触。", zoomImage: "./tui.png", zoomPos: 'center center', zoomSize: 'cover' },
        feather: { title: "粉红羽毛", text: "粉红色来自食物中的类胡萝卜素，颜色越鲜艳代表健康状况越好，在求偶时至关重要。", zoomImage: "./chibang.png", zoomPos: 'center center', zoomSize: 'cover' }
    };

    function showDetail(key) {
        const detail = detailData[key];
        const modalContent = document.getElementById('modalContent');
        const zoomEl = document.getElementById('modalZoom');
        const compareList = document.getElementById('modalCompareList');
        modalContent.classList.remove('is-compare');
        document.getElementById('modalTitle').innerText = detail.title;
        document.getElementById('modalSubtitle').innerText = '外形细节说明';
        document.getElementById('modalText').innerText = detail.text;
        compareList.innerHTML = '';
        
        zoomEl.style.backgroundImage = `url("${detail.zoomImage}")`;
        zoomEl.style.backgroundPosition = detail.zoomPos;
        zoomEl.style.backgroundSize = detail.zoomSize;
        zoomEl.classList.add('active');
        zoomEl.classList.remove('error');
        const testImg = new Image();
        testImg.onload = () => {};
        testImg.onerror = () => {
            zoomEl.style.backgroundImage = 'none';
            zoomEl.classList.add('error');
            zoomEl.innerText = '🖼️ 图片未找到\n请将图片放入同级目录';
        };
        testImg.src = detail.zoomImage;
        
        document.getElementById('infoModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modalContent').classList.remove('is-compare');
        document.getElementById('infoModal').classList.remove('active');
        const zoomEl = document.getElementById('modalZoom');
        zoomEl.classList.remove('error');
        zoomEl.style.backgroundImage = '';
        zoomEl.innerText = '';
    }

    const COMPARE_MAX_CM = 150;
    const animalMeta = {
        flamingo: { img: 'flamingo_side.png.png' },
        crane: { img: 'daning_he.png.png' },
        avocet: { img: 'fanzuiyu.png.png' },
        spoonbill: { img: 'baibilu.png.png' }
    };

    const realData = {
        flamingo: { name: '火烈鸟', length: '130 cm', weight: '3 kg', beak: '15 cm', neck: '70 cm', lifespan: '50 年' },
        crane: { name: '丹顶鹤', length: '150 cm', weight: '8 kg', beak: '15 cm', neck: '55 cm', lifespan: '55 年' },
        avocet: { name: '反嘴鹬', length: '42 cm', weight: '0.3 kg', beak: '8 cm', neck: '25 cm', lifespan: '12 年' },
        spoonbill: { name: '白琵鹭', length: '80 cm', weight: '1.5 kg', beak: '20 cm', neck: '35 cm', lifespan: '25 年' }
    };

    function getHeightPercentByLength(lengthStr) {
        const cm = parseFloat(String(lengthStr).replace(/[^\d.]/g, '')) || 0;
        const pct = (cm / COMPARE_MAX_CM) * 100;
        return `${Math.max(0, Math.min(100, pct)).toFixed(2)}%`;
    }

    const chartDataMap = {
        crane: [115, 80, 100, 79, 110],
        avocet: [32, 10, 53, 36, 24],
        flamingo: [100, 30, 100, 100, 100],
        spoonbill: [62, 50, 133, 50, 50]
    };

    let radarChartInstance = null;
    const ctx = document.getElementById('radarChart').getContext('2d');

    function initChart() {
        Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif';
        Chart.defaults.color = '#1E1F24';
        const isMobile = window.innerWidth < 600;
        // PC端缩小雷达图尺寸，移动端保持原样
        const layoutPadding = isMobile ? 15 : 28;
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['身高', '体重', '喙长', '颈长', '寿命'],
                datasets: [
                    {
                        label: '火烈鸟',
                        data: chartDataMap['flamingo'],
                        backgroundColor: 'rgba(107, 138, 255, 0.32)',
                        borderColor: '#6B8AFF',
                        pointBackgroundColor: '#6B8AFF',
                        borderWidth: 2, pointRadius: 0,
                    },
                    {
                        label: '对比物种',
                        data: chartDataMap['crane'],
                        backgroundColor: 'rgba(132, 134, 145, 0.28)',
                        borderColor: 'rgba(132, 134, 145, 1)',
                        pointBackgroundColor: 'rgba(132, 134, 145, 1)',
                        borderWidth: 2, pointRadius: 0,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                layout: { padding: layoutPadding },
                animation: { duration: 600, easing: 'easeOutQuart' },
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    r: {
                        angleLines: { color: 'rgba(0,0,0,0.1)' },
                        grid: { color: 'rgba(0,0,0,0.1)' },
                        pointLabels: { font: { size: isMobile ? 9 : 10, weight: 'bold' }, padding: 2 },
                        ticks: { display: false, min: 0, max: 133 }
                    }
                }
            }
        });
        updateStatsGrid('crane');
    }

    function triggerRadarAnimation(key) {
        if (!radarChartInstance) return;
        radarChartInstance.data.datasets[1].data = [0, 0, 0, 0, 0];
        radarChartInstance.update('none');
        setTimeout(() => {
            radarChartInstance.data.datasets[1].data = chartDataMap[key];
            radarChartInstance.update();
        }, 50);
    }

    function selectAnimal(key) {
        currentCompareKey = key;
        document.querySelectorAll('.species-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll(`.species-item[data-key="${key}"]`).forEach(el => el.classList.add('active'));
        const targetImgEl = document.getElementById('compareTargetImg');
        const targetContainer = document.getElementById('compareTargetContainer');
        const targetNameEl = document.getElementById('compareTargetName');
        const targetImgSrc = animalMeta[key].img;
        const targetHeight = getHeightPercentByLength(realData[key].length);
        const requestId = ++compareSwapRequestId;
        targetImgEl.style.opacity = 0;
        triggerRadarAnimation(key);
        const preloadImg = new Image();
        preloadImg.onload = () => {
            if (requestId !== compareSwapRequestId) return;
            targetImgEl.src = targetImgSrc;
            targetContainer.style.height = targetHeight;
            targetNameEl.innerText = realData[key].name;
            requestAnimationFrame(() => { if (requestId === compareSwapRequestId) targetImgEl.style.opacity = 1; });
        };
        preloadImg.onerror = () => {
            if (requestId !== compareSwapRequestId) return;
            targetImgEl.src = targetImgSrc;
            targetContainer.style.height = targetHeight;
            targetNameEl.innerText = realData[key].name;
            targetImgEl.style.opacity = 1;
        };
        preloadImg.src = targetImgSrc;
        updateStatsGrid(key);
    }

    function updateStatsGrid(key) {
        const grid = document.getElementById('statsGrid');
        const dTarget = realData[key];
        const dFlamingo = realData['flamingo'];
        const headerRow = `<div class="stat-row stat-header"><span class="stat-label"></span><span class="stat-flamingo">火烈鸟</span><span class="stat-vs" style="opacity:0;">VS</span><span class="stat-target">${dTarget.name}</span></div>`;
        const createRow = (label, valFlamingo, valTarget) => `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-flamingo">${valFlamingo}</span><span class="stat-vs">VS</span><span class="stat-target">${valTarget}</span></div>`;
        grid.innerHTML = headerRow + createRow('身高', dFlamingo.length, dTarget.length) + createRow('体重', dFlamingo.weight, dTarget.weight) + createRow('喙长', dFlamingo.beak, dTarget.beak) + createRow('颈长', dFlamingo.neck, dTarget.neck) + createRow('寿命', dFlamingo.lifespan, dTarget.lifespan);
    }

    window.addEventListener('DOMContentLoaded', () => {
        applyFrameFit();
        initChart();
        switchPose(0);
        document.querySelector('.base-animal').style.height = getHeightPercentByLength(realData.flamingo.length);
        window.addEventListener('resize', () => {
            applyFrameFit();
            if (radarChartInstance) radarChartInstance.resize();
        });
        switchPanelByAvatar(0);
    });
</script>
</body>
</html>
