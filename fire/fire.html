<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>火烈鸟 · 鸟类科普</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            padding: 20px;
            overflow-x: auto;
        }
        @media (min-width: 769px) {
            .app-wrapper {
                transform: scale(1.2);
                transform-origin: center center;
                width: 788px;
                max-width: 788px;
                margin: 0 auto;
            }
            .main-card {
                width: 788px !important;
                height: 492px !important;
            }
            .nav-card {
                width: 788px !important;
                height: 112px !important;
            }
            .ruler-compare-pc,
            .ruler-intro-pc {
                left: 30px !important;
            }
            .species-container {
                margin-left: 40px !important;
            }
            .names-container {
                margin-left: 40px !important;
            }
            .compare-right .data-row {
                padding-top: 6px !important;
                padding-bottom: 6px !important;
            }
            .radar-chart-box {
                height: 233px !important;
            }
            .nav-card .feature-btn {
                height: 44px !important;
                padding: 0 16px !important;
            }
            .nav-card .feature-btn img {
                width: 32px !important;
                height: 32px !important;
            }
            .nav-card .compare-tab-btn {
                height: 44px !important;
                padding: 0 12px !important;
                font-size: 13px !important;
            }
            .nav-card .compare-tab-btn img {
                width: 32px !important;
                height: 32px !important;
                position: relative;
                left: -5px;
            }
        }
        @media (max-width: 768px) {
            body {
                padding: 12px;
                overflow-y: auto;
            }
            .app-wrapper {
                width: 100%;
                max-width: 396px;
                margin: 0 auto;
                transform: none !important;
            }
            .main-card {
                width: 100%;
                aspect-ratio: 380 / 456;
                height: auto;
            }
            .nav-card {
                width: 100%;
                height: auto;
                padding: 8px 0;
            }
            .compare-flex {
                flex-direction: column !important;
            }
            .compare-left {
                flex: auto !important;
                min-height: 380px !important;
                border-right: none !important;
                border-bottom: 1px solid #e2e8f0 !important;
            }
            .mobile-detail-btn {
                position: absolute;
                top: 12px;
                right: 12px;
                z-index: 50;
            }
            .feature-btn {
                padding: 4px 8px !important;
            }
            .feature-btn img {
                width: 28px !important;
                height: 28px !important;
            }
            .compare-tab-btn {
                padding: 4px 8px !important;
                font-size: 11px !important;
            }
            .compare-tab-btn img {
                width: 26px !important;
                height: 26px !important;
            }
        }
        .app-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .main-card {
            background-color: #fef2f2;
            border-radius: 28px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .nav-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 1px solid #fecdd3;
            overflow: hidden;
        }
        .radar-outer {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 12px;
            box-shadow: none;
            width: 100%;
            margin-bottom: 12px;
        }
        .radar-chart-box {
            width: 100%;
            height: 235px;
            position: relative;
        }
        @media (min-width: 769px) {
            .radar-chart-box text {
                font-size: 11px !important;
            }
        }
        @media (max-width: 768px) {
            .radar-chart-box text {
                font-size: 10px !important;
            }
        }
        .radar-chart-box text {
            font-family: 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif !important;
            font-weight: 700 !important;
            fill: #334155 !important;
            dominant-baseline: middle !important;
            text-anchor: middle !important;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .hotspot-pulse {
            animation: pulse-ring 2s infinite;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: scale(0.96) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate {
            animation: fadeSlide 0.2s ease-out;
        }
        img {
            object-fit: contain;
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    (function() {
        // 图片资源（使用用户实际文件名）
        const IMG_BASE = {
            flamingoFront: './flamingo_front.png.png',
            flamingoSide: './flamingo_side.png.png',
            redCrownedCrane: './daning_he.png.png',
            avocet: './fanzuiyu.png.png',
            spoonbill: './baibilu.png.png'
        };
        const PLACEHOLDER = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 260'%3E%3Crect width='180' height='260' fill='%23fecdd3'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23b91c1c' font-size='20' font-weight='bold'%3E🦩%3C/text%3E%3C/svg%3E";

        // 主角：火烈鸟
        const FLAMINGO = {
            id: 'flamingo',
            name: '火烈鸟',
            bodyLength: 130, weight: 3, agility: 70, biteForce: 55, lifespan: 50,
            imageUrl: IMG_BASE.flamingoFront,
            sideImageUrl: IMG_BASE.flamingoSide
        };

        // 对比物种
        const COMPARE_LIST = [
            { id: 'red-crowned-crane', name: '丹顶鹤', bodyLength: 150, weight: 8, agility: 85, biteForce: 90, lifespan: 55, imageUrl: IMG_BASE.redCrownedCrane, color: '#dc2626' },
            { id: 'avocet', name: '反嘴鹬', bodyLength: 42, weight: 0.3, agility: 85, biteForce: 35, lifespan: 12, imageUrl: IMG_BASE.avocet, color: '#475569' },
            { id: 'spoonbill', name: '白琵鹭', bodyLength: 80, weight: 1.5, agility: 75, biteForce: 70, lifespan: 25, imageUrl: IMG_BASE.spoonbill, color: '#facc15' }
        ];

        let currentView = 0;        // 0:外形特征 1:对比视图
        let selectedCompare = COMPARE_LIST[0];
        let isMobile = window.innerWidth < 769;
        let sideView = 'front';
        let mainContainer, navContainer;
        let echartsInstance = null;

        function getRadarValues(animal) {
            return [animal.bodyLength, animal.weight, animal.agility, animal.biteForce, animal.lifespan];
        }

        function renderRadarChart() {
            if (isMobile) return;
            const container = document.getElementById('radarChart');
            if (!container) return;
            const flamingoValues = getRadarValues(FLAMINGO);
            const compareValues = getRadarValues(selectedCompare);
            const indicators = [
                { name: '身长', max: 200 },
                { name: '体重', max: 20 },
                { name: '敏捷', max: 100 },
                { name: '喙力', max: 100 },
                { name: '圈养寿命', max: 60 }
            ];
            const option = {
                radar: {
                    shape: 'polygon', center: ['50%', '50%'], radius: '60%',
                    splitLine: { lineStyle: { color: '#E2E8F0', type: 'dashed', width: 1 } },
                    splitArea: { show: false },
                    axisLine: { lineStyle: { color: '#E2E8F0', width: 1 } },
                    indicator: indicators,
                    axisName: { fontSize: 11, fontWeight: 'bold', color: '#B91C1C', fontFamily: 'Inter, system-ui, sans-serif' }
                },
                series: [
                    { type: 'radar', areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0,color:'rgba(244,63,94,0.35)'},{offset:1,color:'rgba(244,63,94,0.08)'}]) }, lineStyle: { color: '#f43f5e', width: 2 }, symbol: 'none', data: [{ value: flamingoValues, name: FLAMINGO.name }] },
                    { type: 'radar', areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0,color:'rgba(100,116,139,0.2)'},{offset:1,color:'rgba(100,116,139,0.05)'}]) }, lineStyle: { color: '#64748b', width: 2 }, symbol: 'none', data: [{ value: compareValues, name: selectedCompare.name }] }
                ]
            };
            if (echartsInstance && echartsInstance.getDom() === container) {
                echartsInstance.setOption(option, true);
                echartsInstance.resize();
            } else {
                if (echartsInstance) echartsInstance.dispose();
                echartsInstance = echarts.init(container);
                echartsInstance.setOption(option);
            }
        }

        // 外形特征视图（移动端图片高度调整为70%）
        function introViewHTML() {
            let hotspotsArr = [];
            if (sideView === 'front') {
                hotspotsArr.push({
                    id: 'filter-beak', title: '滤食弯喙',
                    desc: '火烈鸟的喙部厚实且向下弯曲，边缘具精密的滤板结构。进食时头部倒悬，利用舌头的活塞运动将水和泥沙滤出，截留藻类、小甲壳动物等，独特的喙型使其成为浅水湿地最高效的滤食者之一。',
                    x: 51, y: 42
                });
            } else {
                hotspotsArr.push({
                    id: 'plumage-side', title: '火焰羽衣',
                    desc: '火烈鸟羽毛呈鲜艳的粉红色至朱红色，这种色彩来源于它们摄取的藻类、卤虫和甲壳类中的类胡萝卜素（虾青素）。雏鸟为灰白色，随年龄增长通过饮食“染色”越发艳丽，是鸟类中罕见的“食物色素造就的华裳”。',
                    x: 47, y: 56
                });
                hotspotsArr.push({
                    id: 'long-legs-side', title: '纤长粉腿',
                    desc: '火烈鸟拥有极为纤细修长的双腿，胫部无羽，呈现玫瑰红色。趾间具蹼，适合在泥泞浅滩行走，膝盖实则隐藏于羽毛之下；单腿站立是其常见休息姿态，可减少体能消耗并维持体温。',
                    x: 49, y: 79
                });
            }
            if (isMobile && sideView === 'front') {
                hotspotsArr = hotspotsArr.map(h => ({ ...h, x: 52, y: 44 }));
            }
            if (isMobile && sideView === 'side') {
                hotspotsArr = hotspotsArr.map(h => {
                    if (h.title === '火焰羽衣') return { ...h, x: 46, y: 58 };
                    if (h.title === '纤长粉腿') return { ...h, x: 48, y: 80 };
                    return h;
                });
            }

            const imgSrc = sideView === 'front' ? FLAMINGO.imageUrl : FLAMINGO.sideImageUrl;
            let imgStyle;
            if (isMobile) {
                if (sideView === 'front') {
                    imgStyle = 'height: 70%; max-width: 26%;';
                } else {
                    imgStyle = 'height: 70%; max-width: 48%;';
                }
            } else {
                imgStyle = 'height: calc(65% + 15px); max-width: 90%;';
            }
            const lineContainerClass = isMobile ? 'absolute left-5 right-0 bottom-16 flex justify-center' : 'absolute left-0 right-0 bottom-16 flex justify-center';
            const rulerClass = isMobile ? 'absolute left-1 md:left-4 flex flex-col justify-between items-end pointer-events-none z-10 ruler-intro-pc' : 'absolute left-2 md:left-4 flex flex-col justify-between items-end pointer-events-none z-10 ruler-intro-pc';
            const rulerStyle = 'top: 3rem; bottom: 3.5rem;';
            return `
                <div class="relative w-full h-full flex flex-col bg-[#fef2f2] overflow-hidden">
                    <div class="absolute top-3 left-1/2 -translate-x-1/2 z-20 flex bg-white/80 backdrop-blur-sm rounded-full p-1 shadow-sm">
                        <button data-side="front" class="side-switch px-4 py-1.5 rounded-full text-sm font-semibold ${sideView === 'front' ? 'bg-white text-rose-600 shadow' : 'text-slate-500'}">正面</button>
                        <button data-side="side" class="side-switch px-4 py-1.5 rounded-full text-sm font-semibold ${sideView === 'side' ? 'bg-white text-rose-600 shadow' : 'text-slate-500'}">侧面</button>
                    </div>
                    <div class="absolute left-0 right-0 bottom-16 top-20 flex items-end justify-center">
                        <div class="relative w-full h-full flex justify-center items-end">
                            <img src="${imgSrc}" alt="火烈鸟" class="object-contain object-bottom drop-shadow-xl" style="${imgStyle}" onerror="this.src='${PLACEHOLDER}'">
                            ${hotspotsArr.map(h => `
                                <button class="absolute hotspot-btn group" style="left: ${h.x}%; top: ${h.y}%; transform: translate(-50%, -50%);" data-title="${h.title}" data-desc='${h.desc}'>
                                    <div class="relative">
                                        <div class="w-6 h-6 rounded-full bg-rose-500/80 border-2 border-white shadow-lg hotspot-pulse"></div>
                                        <div class="absolute inset-0 w-6 h-6 rounded-full bg-rose-400/40"></div>
                                    </div>
                                    <span class="absolute left-1/2 -translate-x-1/2 top-8 whitespace-nowrap bg-white/95 px-2 py-1 rounded-full text-xs font-bold text-slate-700 shadow-md opacity-0 group-hover:opacity-100 transition-opacity">${h.title}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    <div class="${lineContainerClass}">
                        <div class="w-[75%] h-px bg-slate-400"></div>
                    </div>
                    <div class="absolute left-0 right-0 bottom-4 text-center text-sm font-bold text-rose-700">火烈鸟</div>
                    <div class="${rulerClass}" style="${rulerStyle}">
                        ${[200,150,100,50,0].map(v => `
                            <div class="flex items-center gap-${isMobile ? '1' : '2'}">
                                <span class="text-xs text-slate-500 font-medium">${v}厘米</span>
                                <div class="w-${isMobile ? '2' : '4'} h-[1px] bg-slate-400"></div>
                            </div>
                        `).join('')}
                        <div class="absolute right-0 top-0 bottom-0 w-[1px] bg-slate-300"></div>
                    </div>
                </div>
            `;
        }

        // 对比视图（移动端底部名称统一使用 left-14 + margin-left:35px 且宽度固定）
        function compareViewHTML() {
            const compareHeight = (selectedCompare.bodyLength / 200) * 100;
            
            let leftContainerStyle = '';
            let rightContainerStyle = '';
            // 移动端底部名称统一使用以下样式（与丹顶鹤一致）
            let nameContainerLeft = 'left-14';
            let nameContainerMargin = 'margin-left: 35px;';
            let secondNameWidth = 'clamp(100px, 24vw, 100px)';
            let firstNameWidth = 'clamp(110px, 28vw, 190px)';

            if (!isMobile) {
                // PC端样式（保持不变）
                leftContainerStyle = 'width: clamp(110px, 28vw, 195px); height: calc(60% + 10px); margin-left: 30px;';
                if (selectedCompare.id === 'red-crowned-crane') {
                    rightContainerStyle = 'width: clamp(100px, 24vw, 190px); height: calc(70% + 20px); margin-left: -45px;';
                } else if (selectedCompare.id === 'avocet') {
                    rightContainerStyle = 'width: clamp(100px, 24vw, 130px); height: calc(21% + 10px); margin-left: -10px;';
                } else if (selectedCompare.id === 'spoonbill') {
                    rightContainerStyle = `width: clamp(100px, 24vw, 170px); height: calc(${compareHeight}% + 10px); margin-left: -10px;`;
                } else {
                    rightContainerStyle = `width: clamp(100px, 24vw, 170px); height: calc(${compareHeight}% + 10px); margin-left: -10px;`;
                }
                // PC端名称样式保持原样（不强制覆盖）
                nameContainerLeft = 'left-14';
                nameContainerMargin = 'margin-left: 40px;';
                secondNameWidth = 'clamp(100px, 24vw, 100px)';
                firstNameWidth = 'clamp(110px, 28vw, 190px)';
            } else {
                // 移动端样式：左侧火烈鸟固定
                leftContainerStyle = 'width: clamp(145px, 28vw, 180px); height: 63%; margin-left: 50px;';
                // 右侧对比物种图片样式按原逻辑（不同物种不同比例）
                if (selectedCompare.id === 'red-crowned-crane') {
                    rightContainerStyle = 'width: clamp(150px, 26vw, 170px); height: calc(71% + 10px); margin-left: -30px;';
                } else if (selectedCompare.id === 'avocet') {
                    rightContainerStyle = 'width: clamp(82px, 24vw, 130px); height: calc(22% + 10px); margin-left: -10px;';
                } else if (selectedCompare.id === 'spoonbill') {
                    rightContainerStyle = 'width: clamp(110px, 24vw, 150px); height: calc(40% + 10px); margin-left: -16px;';
                } else {
                    rightContainerStyle = `width: clamp(100px, 24vw, 150px); height: calc(78% + 10px); margin-left: -16px;`;
                }
                // ★ 关键：移动端三个对比页面（丹顶鹤、反嘴鹬、白琵鹭）底部文字格式统一使用 left-14 + margin-left:35px，
                // 且名称宽度统一，不再区分物种。
                nameContainerLeft = 'left-14';
                nameContainerMargin = 'margin-left: 35px;';
                firstNameWidth = 'clamp(110px, 28vw, 190px)';
                secondNameWidth = 'clamp(100px, 24vw, 100px)';
            }

            return `
                <div class="relative w-full h-full flex md:flex-row bg-[#fef2f2] compare-flex">
                    ${isMobile ? `<div class="mobile-detail-btn"><button id="mobileDetailOpenBtn" class="bg-white/90 backdrop-blur-sm border-2 border-rose-500 text-rose-600 font-bold px-3 py-1.5 rounded-full shadow-md text-xs">详细对比</button></div>` : ''}
                    <div class="relative flex-[1.6] flex flex-col justify-end p-2 md:p-3 border-b md:border-b-0 md:border-r border-rose-200/60 compare-left">
                        <div class="absolute left-2 md:left-4 flex flex-col justify-between items-end pointer-events-none z-10 ruler-compare-pc" style="top: 3rem; bottom: 3.5rem;">
                            <div class="flex items-center gap-2"><span class="text-xs text-slate-500 font-medium">200厘米</span><div class="w-4 h-[1px] bg-slate-400"></div></div>
                            <div class="flex items-center gap-2"><span class="text-xs text-slate-500 font-medium">150厘米</span><div class="w-4 h-[1px] bg-slate-400"></div></div>
                            <div class="flex items-center gap-2"><span class="text-xs text-slate-500 font-medium">100厘米</span><div class="w-4 h-[1px] bg-slate-400"></div></div>
                            <div class="flex items-center gap-2"><span class="text-xs text-slate-500 font-medium">50厘米</span><div class="w-4 h-[1px] bg-slate-400"></div></div>
                            <div class="flex items-center gap-2"><span class="text-xs text-slate-500 font-medium">0厘米</span><div class="w-4 h-[1px] bg-slate-400"></div></div>
                            <div class="absolute right-0 top-0 bottom-0 w-[1px] bg-slate-300"></div>
                        </div>
                        <div class="absolute flex items-end justify-start gap-3 md:gap-5 left-7 right-3 top-12 bottom-14 species-container" style="margin-left: ${isMobile ? '0px' : '40px'};">
                            <!-- 左侧火烈鸟侧面 -->
                            <div class="flex flex-col items-center shrink-0" style="${leftContainerStyle}">
                                <img src="${FLAMINGO.sideImageUrl}" class="w-full h-full object-contain object-bottom drop-shadow-lg" onerror="this.src='${PLACEHOLDER}'" alt="火烈鸟">
                            </div>
                            <!-- 右侧对比物种 -->
                            <div class="flex flex-col items-center shrink-0" style="${rightContainerStyle}">
                                <img src="${selectedCompare.imageUrl}" class="w-full h-full object-contain object-bottom drop-shadow-lg" onerror="this.src='${PLACEHOLDER}'" alt="${selectedCompare.name}">
                            </div>
                        </div>
                        <div class="absolute left-7 right-3 bottom-14 h-[2px] bg-slate-400/50" style="left: ${isMobile ? '75px' : '100px'}; right: 16px;"></div>
                        <!-- 名称容器：移动端统一应用 left-14 + margin-left:35px，且宽度固定 -->
                        <div class="absolute bottom-4 ${nameContainerLeft} right-3 flex justify-start gap-6 md:gap-8 names-container" style="${nameContainerMargin}">
                            <div class="flex flex-col items-center shrink-0" style="width: ${firstNameWidth};">
                                <span class="text-xs md:text-sm font-bold text-rose-600 whitespace-nowrap">火烈鸟</span>
                            </div>
                            <div class="flex flex-col items-center shrink-0" style="width: ${secondNameWidth};">
                                <span class="text-xs md:text-sm font-bold text-slate-700 whitespace-nowrap">${selectedCompare.name}</span>
                            </div>
                        </div>
                    </div>
                    ${!isMobile ? `
                    <div class="flex-1 flex flex-col p-3 md:p-4 bg-white/50 backdrop-blur-sm overflow-y-auto compare-right">
                        <div class="radar-outer">
                            <div class="radar-chart-box">
                                <div id="radarChart" style="width:100%; height:100%;"></div>
                            </div>
                        </div>
                        <div class="space-y-1 mt-1">
                            ${['bodyLength','weight','agility','biteForce','lifespan'].map(key => {
                                const labels = { bodyLength:'身长', weight:'体重', agility:'敏捷', biteForce:'喙力', lifespan:'圈养寿命' };
                                const unit = { bodyLength:'厘米', weight:'公斤', agility:'分', biteForce:'分', lifespan:'年' };
                                return `
                                <div class="flex justify-between items-center rounded-lg bg-white/50 data-row" style="padding-left: 8px; padding-right: 8px;">
                                    <span class="text-slate-600 text-xs font-bold">${labels[key]}</span>
                                    <div class="flex gap-2 items-center">
                                        <span class="font-bold text-rose-500 text-sm">${FLAMINGO[key]}<span class="text-[10px] ml-0.5">${unit[key]}</span></span>
                                        <span class="text-slate-300 text-xs">vs</span>
                                        <span class="font-bold text-slate-700 text-sm">${selectedCompare[key]}<span class="text-[10px] ml-0.5">${unit[key]}</span></span>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function showMobileCompareModal() {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4';
            modalDiv.style.background = 'rgba(0,0,0,0.65)';
            modalDiv.style.backdropFilter = 'blur(4px)';
            modalDiv.innerHTML = `
                <div class="bg-white rounded-3xl w-full max-w-[360px] max-h-[75vh] overflow-y-auto p-5 modal-animate relative">
                    <button class="absolute top-3 right-3 w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-500" id="closeCompareModalBtn">✕</button>
                    <h3 class="text-xl font-black text-rose-600">参数对比</h3>
                    <div class="text-sm text-slate-500 mb-4">火烈鸟 vs ${selectedCompare.name}</div>
                    <div class="space-y-2">
                        ${['bodyLength','weight','agility','biteForce','lifespan'].map(key => {
                            const labels = { bodyLength:'身长', weight:'体重', agility:'敏捷', biteForce:'喙力', lifespan:'圈养寿命' };
                            const unit = { bodyLength:'厘米', weight:'公斤', agility:'分', biteForce:'分', lifespan:'年' };
                            return `
                            <div class="flex justify-between items-center py-2 border-b border-rose-100">
                                <span class="text-slate-600 text-sm font-medium">${labels[key]}</span>
                                <div class="flex gap-3 items-center">
                                    <span class="font-bold text-rose-500">${FLAMINGO[key]}${unit[key]}</span>
                                    <span class="text-slate-300 text-xs">VS</span>
                                    <span class="font-bold text-slate-700">${selectedCompare[key]}${unit[key]}</span>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            const close = () => modalDiv.remove();
            modalDiv.querySelector('#closeCompareModalBtn')?.addEventListener('click', close);
            modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) close(); });
        }

        function showHotspotModal(title, desc) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4';
            modal.style.background = 'rgba(0,0,0,0.5)';
            modal.innerHTML = `
                <div class="bg-white rounded-2xl max-w-sm w-full p-5 modal-animate relative">
                    <button class="absolute top-2 right-2 text-2xl text-slate-400" id="closeHotspotBtn">&times;</button>
                    <div class="h-1 w-12 bg-rose-500 rounded-full mb-3"></div>
                    <h4 class="text-xl font-black text-rose-700">${title}</h4>
                    <p class="text-slate-600 mt-2 text-sm leading-relaxed">${desc}</p>
                    <button id="hotConfirmBtn" class="mt-5 w-full py-2 bg-rose-50 rounded-xl font-medium text-rose-700">关闭</button>
                </div>
            `;
            document.body.appendChild(modal);
            const remove = () => modal.remove();
            modal.querySelector('#closeHotspotBtn')?.addEventListener('click', remove);
            modal.querySelector('#hotConfirmBtn')?.addEventListener('click', remove);
            modal.addEventListener('click', (e) => { if (e.target === modal) remove(); });
        }

        function renderMain() {
            if (!mainContainer) return;
            const html = currentView === 0 ? introViewHTML() : compareViewHTML();
            mainContainer.innerHTML = html;
            if (currentView === 0) {
                document.querySelectorAll('.side-switch').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const newSide = btn.dataset.side;
                        if (newSide) { sideView = newSide; renderMain(); renderNav(); }
                    });
                });
                document.querySelectorAll('.hotspot-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const title = btn.dataset.title, desc = btn.dataset.desc;
                        if (title) showHotspotModal(title, desc);
                    });
                });
                if (echartsInstance) { echartsInstance.dispose(); echartsInstance = null; }
            } else {
                if (isMobile) {
                    const mobileBtn = document.getElementById('mobileDetailOpenBtn');
                    if (mobileBtn) mobileBtn.onclick = () => showMobileCompareModal();
                } else {
                    setTimeout(() => { renderRadarChart(); }, 30);
                }
            }
        }

        function renderNav() {
            if (!navContainer) return;
            navContainer.innerHTML = `
                <div class="flex w-full">
                    <div class="flex-1 flex flex-col items-center justify-center gap-1 border-r border-rose-200 bg-rose-50/30 py-6">
                        <span class="font-bold text-[10px] md:text-xs transition-colors" style="color: #b91c1c;">外形特征</span>
                        <button id="navIntroBtn" class="feature-btn justify-center whitespace-nowrap font-medium shadow-sm h-9 py-2 rounded-full px-2 flex items-center gap-1.5 transition-all text-sm bg-white border-2 ${currentView === 0 ? 'border-rose-500 text-rose-600' : 'border-slate-200 text-slate-600'}">
                            <img src="${FLAMINGO.imageUrl}" class="rounded-full object-contain border-2 border-white shadow-sm bg-white" style="width: 32px; height: 32px;" onerror="this.src='${PLACEHOLDER}'">
                            <span class="font-bold leading-tight whitespace-nowrap">火烈鸟</span>
                        </button>
                    </div>
                    <div class="flex-[2] flex flex-col items-center justify-center gap-1 bg-white py-1">
                        <span class="font-bold text-[10px] md:text-xs transition-colors ${currentView === 1 ? 'text-rose-600' : 'text-slate-500'}">物种对比</span>
                        <div class="flex items-center gap-2">
                            ${COMPARE_LIST.map(animal => `
                                <button data-compare="${animal.id}" class="compare-tab-btn justify-center whitespace-nowrap font-medium shadow-sm h-9 py-2 rounded-full px-3 flex items-center gap-1.5 transition-all text-sm bg-white border-2 ${currentView === 1 && selectedCompare.id === animal.id ? 'border-rose-500 text-rose-600' : 'border-slate-200 text-slate-600'}">
                                    <img src="${animal.imageUrl}" class="rounded-full object-contain border-2 border-white shadow-sm bg-white" style="width: 32px; height: 32px;" onerror="this.src='${PLACEHOLDER}'">
                                    <span class="font-bold leading-tight whitespace-nowrap">${animal.name}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('navIntroBtn')?.addEventListener('click', () => {
                if (currentView === 0) return;
                currentView = 0;
                renderMain();
                renderNav();
            });
            document.querySelectorAll('.compare-tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.compare;
                    const found = COMPARE_LIST.find(a => a.id === id);
                    if (found && found.id !== selectedCompare.id) {
                        selectedCompare = found;
                        currentView = 1;
                        renderMain();
                        renderNav();
                    } else if (currentView !== 1) {
                        currentView = 1;
                        renderMain();
                        renderNav();
                    } else if (found && found.id === selectedCompare.id && currentView === 1) {
                        if (!isMobile) setTimeout(() => renderRadarChart(), 20);
                    }
                });
            });
        }

        function handleResize() {
            const newMobile = window.innerWidth < 769;
            if (newMobile !== isMobile) {
                isMobile = newMobile;
                if (echartsInstance) { echartsInstance.dispose(); echartsInstance = null; }
                renderMain();
                renderNav();
            } else if (currentView === 1 && !isMobile) {
                setTimeout(() => { if (document.getElementById('radarChart')) renderRadarChart(); }, 50);
            }
        }

        function init() {
            const wrapper = document.createElement('div');
            wrapper.className = 'app-wrapper';
            const mainCard = document.createElement('div');
            mainCard.className = 'main-card';
            mainContainer = document.createElement('div');
            mainContainer.className = 'w-full h-full relative';
            mainCard.appendChild(mainContainer);
            const navCard = document.createElement('div');
            navCard.className = 'nav-card';
            navContainer = document.createElement('div');
            navCard.appendChild(navContainer);
            wrapper.appendChild(mainCard);
            wrapper.appendChild(navCard);
            document.body.appendChild(wrapper);
            renderMain();
            renderNav();
            window.addEventListener('resize', handleResize);
        }
        init();
    })();
</script>
</body>
</html>
